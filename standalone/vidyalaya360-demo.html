;(function(){

function ScreenStudents({ E, refresh }) {
  // ---------- state ----------
  const [classFilter, setClassFilter] = useState("All");
  const [filterOpen, setFilterOpen] = useState(false);
  const [showAdmission, setShowAdmission] = useState(false);
  const [showImport, setShowImport] = useState(false);
  const [profileOf, setProfileOf] = useState(null);
  const [picked, setPicked] = useState(new Set());
  const [openMenuFor, setOpenMenuFor] = useState(null);
  const [menuAnchor, setMenuAnchor] = useState(null);
  const [view, setView] = useState("active"); // 'active' | 'archived'
  const [confirmArchive, setConfirmArchive] = useState(null); // student awaiting confirmation
  const [toast, setToast] = useState(null);
  const toastTimer = useRef(null);
  const flash = (msg, tone = "ok") => {
    setToast({ msg, tone });
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 2400);
  };

  // ---------- data ----------
  // The roster is populated entirely from real DB rows (no mock baseline).
  const activeRoster   = (E.ADDED_STUDENTS    || []).map((s) => ({ ...s, __added: true, __status: "active" }));
  const archivedRoster = (E.ARCHIVED_STUDENTS || []).map((s) => ({ ...s, __added: true, __status: "archived" }));
  const roster = view === "archived" ? archivedRoster : activeRoster;

  const visible = roster.filter((s) => {
    if (classFilter === "All") return true;
    return `Class ${s.cls.split("-")[0]}` === classFilter;
  });

  const eligibleIds = visible.map((s) => s.id);
  const allChecked = eligibleIds.length > 0 && eligibleIds.every((id) => picked.has(id));

  // Drop selections that no longer exist
  useEffect(() => {
    setPicked((prev) => {
      const valid = new Set(roster.map((s) => s.id));
      let changed = false;
      const next = new Set();
      prev.forEach((id) => { if (valid.has(id)) next.add(id); else changed = true; });
      return changed ? next : prev;
    });
  }, [roster.length]); // eslint-disable-line react-hooks/exhaustive-deps

  // ---------- handlers ----------
  const togglePick = (id) =>
    setPicked((prev) => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  const togglePickAll = () => {
    if (allChecked) setPicked(new Set());
    else setPicked(new Set(eligibleIds));
  };

  const exportCsv = () => {
    const header = "ID,Name,Class,Parent,Attendance,Fee,Transport,Joined";
    const rows = visible.map(
      (s) => `${s.id},"${s.name}",${s.cls},${s.parent.replace(/,/g, "")},${s.attendance}%,${s.fee},${s.transport},${s.joined}`
    );
    const csv = [header, ...rows].join("\n");
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `students-${classFilter.replace(/\s+/g, "-").toLowerCase()}-${new Date().toISOString().slice(0, 10)}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    flash(`Exported ${visible.length} rows to CSV`);
  };

  // Wrap fetch so a network failure (server restart, dev hot-reload mid-click,
  // offline) becomes a toast instead of an unhandled "Failed to fetch" overlay.
  const safeFetch = async (url, init) => {
    try {
      const method = (init && init.method) || "GET";
      const body = init && init.body ? JSON.parse(init.body) : null;
      let json = { ok: false };
      if (url === "/api/students" && method === "POST") json = await store.addStudent(body);
      else if (url === "/api/students" && method === "DELETE") json = await store.archiveStudent(body.id);
      else if (url === "/api/students/restore") json = await store.restoreStudent(body.id);
      else if (url === "/api/students/import") json = await store.importStudents(body.csv);
      else if (url === "/api/fees/pay") json = await store.payFee(body.id, body.method);
      else if (url === "/api/fees/remind") json = await store.remindFees(body.ids, body.channel);
      else if (url === "/api/complaints") json = await store.patchComplaint(body.id, body.status);
      else if (url === "/api/enquiries") json = await store.patchEnquiry(body.id, body.status);
      else if (url === "/api/academic/log") json = await store.upsertDailyLog(body);
      return { ok: !!json.ok, status: 200, json };
    } catch (e) {
      return { ok: false, status: 0, json: { error: "Storage error: " + e.message } };
    }
  };

  const handleImportFile = (file) => {
    const reader = new FileReader();
    reader.onload = async (ev) => {
      const csv = ev.target?.result;
      if (typeof csv !== "string") { flash("Could not read file", "bad"); return; }
      const { ok, json } = await safeFetch("/api/students/import", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ csv }),
      });
      if (ok) {
        flash(`Imported ${json.count} students`);
        await refresh?.();
        setShowImport(false);
      } else {
        flash(json.error || "Import failed", "bad");
      }
    };
    reader.onerror = () => flash("Could not read file", "bad");
    reader.readAsText(file);
  };

  const submitAdmission = async (form) => {
    const { ok, json } = await safeFetch("/api/students", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify(form),
    });
    if (ok) {
      flash(`Admitted ${json.student.name} · ${json.student.id}`);
      await refresh?.();
      setShowAdmission(false);
    } else {
      flash(json.error || "Admission failed", "bad");
    }
  };

  // Soft-delete: archives the student. All their fee receipts and daily logs
  // are preserved. The pending fee (if any) is dropped because we no longer
  // expect to collect it.
  const archiveStudent = async (s) => {
    const { ok, json } = await safeFetch("/api/students", {
      method: "DELETE",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ id: s.id }),
    });
    if (ok) { flash(`Withdrew ${s.name} · history preserved`); await refresh?.(); }
    else flash(json.error || "Withdraw failed", "bad");
    setOpenMenuFor(null);
    setConfirmArchive(null);
  };

  const restoreStudent = async (s) => {
    const { ok, json } = await safeFetch("/api/students/restore", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ id: s.id }),
    });
    if (ok) { flash(`Restored ${s.name}`); await refresh?.(); }
    else flash(json.error || "Restore failed", "bad");
    setOpenMenuFor(null);
  };

  // ---------- render ----------
  return (
    <div className="page">
      <Toast toast={toast} />

      <div className="page-head">
        <div>
          <div className="page-eyebrow">People · Roster</div>
          <div className="page-title">Students <span className="amber">at school</span></div>
          <div className="page-sub">{roster.length} {roster.length === 1 ? "child" : "children"} on roll · classes 1–8</div>
        </div>
        <div className="page-actions">
          <button className="btn" onClick={() => setShowImport(true)}><Icon name="upload" size={13} />Import</button>
          <button className="btn" onClick={exportCsv}><Icon name="download" size={13} />Export</button>
          <button className="btn accent" onClick={() => setShowAdmission(true)}><Icon name="plus" size={13} />New admission</button>
        </div>
      </div>

      <div className="grid g-4" style={{ marginBottom: 14 }}>
        <KPI label="Enrolled" value={roster.length} sub="across 8 classes" puck="mint" puckIcon="students" />
        <KPI label="New admissions" value={roster.length} sub="this session" puck="peach" puckIcon="enquiry" />
        <KPI label="Average attendance" value={roster.length ? `${Math.round(roster.reduce((a, s) => a + (s.attendance || 0), 0) / roster.length)}%` : "—"} sub="across all students" puck="cream" puckIcon="check" />
        <KPI label="Transfer certificates" value={0} sub="processed this month" puck="rose" puckIcon="reports" />
      </div>

      <div className="card">
        <div className="card-head">
          <div>
            <div className="card-title">{view === "archived" ? "Archived students" : "All students"}</div>
            <div className="card-sub">
              {view === "archived"
                ? `${archivedRoster.length} withdrawn · records preserved`
                : "Auto-assigned IDs · auto fee schedule"}
            </div>
          </div>
          <div className="card-actions">
            <div className="segmented">
              <button className={view === "active" ? "active" : ""} onClick={() => setView("active")}>
                Active · {activeRoster.length}
              </button>
              <button className={view === "archived" ? "active" : ""} onClick={() => setView("archived")}>
                Archived · {archivedRoster.length}
              </button>
            </div>
            <div className="segmented" style={{ flexWrap: "wrap" }}>
              {["All", "Class 1", "Class 2", "Class 3", "Class 4", "Class 5", "Class 6", "Class 7", "Class 8"].map((f) => (
                <button key={f} className={classFilter === f ? "active" : ""} onClick={() => setClassFilter(f)}>{f}</button>
              ))}
            </div>
            <div style={{ position: "relative" }}>
              <button className={`btn sm ${classFilter !== "All" ? "accent" : ""}`} onClick={() => setFilterOpen((v) => !v)}>
                <Icon name="filter" size={12} />
                {classFilter === "All" ? "Filter" : classFilter}
              </button>
              {filterOpen && (
                <FilterMenu
                  value={classFilter}
                  onClose={() => setFilterOpen(false)}
                  onPick={(v) => { setClassFilter(v); setFilterOpen(false); }}
                />
              )}
            </div>
          </div>
        </div>

        {picked.size > 0 && (
          <div style={{
            padding: "10px 18px", display: "flex", alignItems: "center", gap: 12,
            background: "var(--accent-soft)", borderBottom: "1px solid var(--rule-2)",
            fontSize: 12.5,
          }}>
            <span style={{ fontWeight: 500, color: "var(--accent-2)" }}>{picked.size} selected</span>
            <button className="btn sm accent" onClick={() => flash(`WhatsApp template queued for ${picked.size} parents`)}>
              <Icon name="whatsapp" size={11} />Message parents
            </button>
            <button className="btn sm" onClick={() => flash(`SMS queued for ${picked.size} parents`)}>
              <Icon name="sms" size={11} />SMS parents
            </button>
            <button className="btn sm ghost" onClick={() => setPicked(new Set())} style={{ marginLeft: "auto" }}>Clear</button>
          </div>
        )}

        <div style={{ overflowX: "auto" }}>
          <table className="table">
            <thead>
              <tr>
                <th style={{ width: 24 }}>
                  <input
                    type="checkbox"
                    checked={allChecked}
                    onChange={togglePickAll}
                    disabled={eligibleIds.length === 0}
                  />
                </th>
                <th>Student</th>
                <th>ID</th>
                <th>Class</th>
                <th>Parent</th>
                <th>Attendance</th>
                <th>Fee</th>
                <th>Transport</th>
                <th>Joined</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {visible.length === 0 && (
                <tr><td colSpan={10} className="empty">No students match this filter.</td></tr>
              )}
              {visible.map((s) => (
                <tr key={s.id}>
                  <td><input type="checkbox" checked={picked.has(s.id)} onChange={() => togglePick(s.id)} /></td>
                  <td>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <AvatarChip initials={s.name.split(" ").map((n) => n[0]).join("")} />
                      <span style={{ fontSize: 12.5, fontWeight: 500 }}>
                        {s.name}
                        {s.__added && (
                          <span className="chip ok" style={{ marginLeft: 6, fontSize: 10, height: 18, padding: "0 6px" }}>
                            <span className="dot" />new
                          </span>
                        )}
                      </span>
                    </div>
                  </td>
                  <td style={{ fontFamily: "var(--font-mono)", fontSize: 11.5, color: "var(--ink-3)" }}>{s.id}</td>
                  <td><span className="chip">{s.cls}</span></td>
                  <td style={{ fontFamily: "var(--font-mono)", fontSize: 12, color: "var(--ink-3)" }}>{s.parent}</td>
                  <td>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <div className="bar" style={{ width: 60 }}>
                        <span style={{ width: `${s.attendance}%`, background: s.attendance < 85 ? "var(--warn)" : "var(--ok)" }} />
                      </div>
                      <span className="mono" style={{ fontSize: 11, color: "var(--ink-3)" }}>{s.attendance}%</span>
                    </div>
                  </td>
                  <td><StatusChip status={s.fee}>{s.fee.charAt(0).toUpperCase() + s.fee.slice(1)}</StatusChip></td>
                  <td style={{ fontSize: 12, color: "var(--ink-3)" }}>{s.transport}</td>
                  <td style={{ fontSize: 12, color: "var(--ink-3)" }}>{s.joined}</td>
                  <td>
                    <button
                      className="icon-btn"
                      onClick={(e) => {
                        if (openMenuFor === s.id) { setOpenMenuFor(null); return; }
                        const rect = e.currentTarget.getBoundingClientRect();
                        setOpenMenuFor(s.id);
                        setMenuAnchor({ x: rect.right, y: rect.bottom });
                      }}
                    >
                      <Icon name="more" size={14} />
                    </button>
                    {openMenuFor === s.id && menuAnchor && (
                      <RowMenu
                        student={s}
                        anchor={menuAnchor}
                        onClose={() => setOpenMenuFor(null)}
                        onView={() => { setProfileOf(s); setOpenMenuFor(null); }}
                        onTC={() => { flash(`TC requested for ${s.name} · queued`); setOpenMenuFor(null); }}
                        onMessage={() => { window.open(`https://wa.me/${s.parent.replace(/[^0-9]/g, "")}`, "_blank"); flash("Opened WhatsApp"); setOpenMenuFor(null); }}
                        onWithdraw={() => { setConfirmArchive(s); setOpenMenuFor(null); }}
                        onRestore={() => restoreStudent(s)}
                      />
                    )}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {confirmArchive && (
        <ConfirmArchive
          student={confirmArchive}
          onCancel={() => setConfirmArchive(null)}
          onConfirm={() => archiveStudent(confirmArchive)}
        />
      )}
      {showAdmission && <AdmissionModal onClose={() => setShowAdmission(false)} onSubmit={submitAdmission} />}
      {showImport && <ImportModal onClose={() => setShowImport(false)} onFile={handleImportFile} />}
      {profileOf && (
        <ProfileModal
          student={profileOf}
          onClose={() => setProfileOf(null)}
          onMessage={() => { window.open(`https://wa.me/${profileOf.parent.replace(/[^0-9]/g, "")}`, "_blank"); flash("Opened WhatsApp"); }}
          onTC={() => { flash(`TC requested for ${profileOf.name} · queued`); setProfileOf(null); }}
        />
      )}
    </div>
  );
}

// ---------- helpers ----------
function Toast({ toast }) {
  if (!toast) return null;
  const bg = toast.tone === "bad" ? "var(--bad)" : toast.tone === "warn" ? "var(--warn)" : "var(--ok)";
  return (
    <div style={{
      position: "fixed", top: 76, left: "50%", transform: "translateX(-50%)",
      zIndex: 300, background: bg, color: "#fff", padding: "10px 18px",
      borderRadius: 999, fontSize: 12.5, fontWeight: 500, boxShadow: "var(--shadow-lg)",
    }}>{toast.msg}</div>
  );
}

function FilterMenu({ value, onPick, onClose }) {
  useEffect(() => {
    const onDoc = (e) => {
      if (!e.target.closest(".filter-menu") && !e.target.closest(".btn")) onClose();
    };
    setTimeout(() => document.addEventListener("click", onDoc), 0);
    return () => document.removeEventListener("click", onDoc);
  }, [onClose]);
  const opts = ["All", "Class 1", "Class 2", "Class 3", "Class 4", "Class 5", "Class 6", "Class 7", "Class 8"];
  return (
    <div className="filter-menu" style={{
      position: "absolute", top: "calc(100% + 6px)", right: 0, zIndex: 50,
      background: "var(--card)", border: "1px solid var(--rule)", borderRadius: 10,
      boxShadow: "var(--shadow-lg)", padding: 6, minWidth: 160,
    }}>
      <div style={{ fontSize: 10.5, color: "var(--ink-3)", textTransform: "uppercase", letterSpacing: "0.08em", padding: "6px 10px 4px" }}>
        Filter by class
      </div>
      {opts.map((o) => (
        <button key={o} onClick={() => onPick(o)} className="btn ghost"
          style={{
            width: "100%", justifyContent: "flex-start", height: 30, padding: "0 10px",
            fontSize: 12.5, background: value === o ? "var(--accent-soft)" : "transparent",
            color: value === o ? "var(--accent-2)" : "var(--ink)", fontWeight: value === o ? 500 : 400,
          }}>
          {o}
        </button>
      ))}
    </div>
  );
}

function RowMenu({ student, anchor, onClose, onView, onTC, onMessage, onWithdraw, onRestore }) {
  // Close on outside click + on scroll/resize (the menu is fixed-positioned
  // relative to the trigger, so anything that moves the trigger should close it).
  useEffect(() => {
    const onDoc = (e) => {
      if (!e.target.closest(".row-menu") && !e.target.closest(".icon-btn")) onClose();
    };
    const onScrollOrResize = () => onClose();
    setTimeout(() => document.addEventListener("click", onDoc), 0);
    window.addEventListener("scroll", onScrollOrResize, true);
    window.addEventListener("resize", onScrollOrResize);
    return () => {
      document.removeEventListener("click", onDoc);
      window.removeEventListener("scroll", onScrollOrResize, true);
      window.removeEventListener("resize", onScrollOrResize);
    };
  }, [onClose]);

  const isArchived = student.__status === "archived";
  const items = [
    { label: "View profile", icon: "user", action: onView },
    { label: "Message parent", icon: "whatsapp", action: onMessage, disabled: isArchived },
    { label: "Issue TC", icon: "book", action: onTC },
    isArchived
      ? { label: "Restore admission", icon: "refresh", action: onRestore }
      : { label: "Withdraw…", icon: "x", action: onWithdraw, danger: true },
  ];

  // Position the menu so its right edge aligns with the trigger's right edge
  // and it sits 6px below. If it would fall off the bottom of the viewport,
  // flip it above the trigger.
  const MENU_W = 200;
  const MENU_H = 4 * 32 + 8; // approx
  const wantsFlip = anchor.y + MENU_H + 16 > window.innerHeight;
  const top = wantsFlip ? Math.max(8, anchor.y - MENU_H - 24) : anchor.y + 6;
  const left = Math.max(8, anchor.x - MENU_W);

  return (
    <div className="row-menu" style={{
      position: "fixed", top, left, zIndex: 200, width: MENU_W,
      background: "var(--card)", border: "1px solid var(--rule)", borderRadius: 9,
      boxShadow: "var(--shadow-lg)", padding: 4,
    }}>
      {items.map((it) => (
        <button
          key={it.label}
          onClick={it.disabled ? undefined : it.action}
          className="btn ghost"
          disabled={it.disabled}
          style={{
            width: "100%", justifyContent: "flex-start", height: 30, padding: "0 10px",
            fontSize: 12.5, color: it.danger && !it.disabled ? "var(--bad)" : it.disabled ? "var(--ink-4)" : "var(--ink)",
            cursor: it.disabled ? "not-allowed" : "pointer",
          }}
        >
          <Icon name={it.icon} size={12} />{it.label}
        </button>
      ))}
    </div>
  );
}

function ModalShell({ title, sub, onClose, children, width = 460 }) {
  useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    document.addEventListener("keydown", onKey);
    return () => document.removeEventListener("keydown", onKey);
  }, [onClose]);
  return (
    <div
      onClick={onClose}
      style={{
        position: "fixed", inset: 0, background: "rgba(20,16,10,0.45)",
        display: "grid", placeItems: "center", zIndex: 250, padding: 16,
      }}
    >
      <div onClick={(e) => e.stopPropagation()} className="card" style={{ width: "100%", maxWidth: width }}>
        <div className="card-head">
          <div>
            <div className="card-title">{title}</div>
            {sub && <div className="card-sub">{sub}</div>}
          </div>
          <button className="icon-btn" onClick={onClose}><Icon name="x" size={14} /></button>
        </div>
        {children}
      </div>
    </div>
  );
}

function AdmissionModal({ onClose, onSubmit }) {
  const [form, setForm] = useState({ name: "", cls: "1", section: "A", phoneDigits: "", transport: "—" });
  const [busy, setBusy] = useState(false);
  const [touched, setTouched] = useState({});
  const set = (k, v) => setForm((f) => ({ ...f, [k]: v }));

  // ---- Indian phone helpers ----
  const onPhoneChange = (e) => {
    const onlyDigits = e.target.value.replace(/\D/g, "").slice(0, 10);
    set("phoneDigits", onlyDigits);
  };
  const phoneError = (() => {
    if (!form.phoneDigits) return null; // optional until user types
    if (form.phoneDigits.length !== 10) return "Phone must be exactly 10 digits";
    if (!/^[6-9]/.test(form.phoneDigits)) return "Indian mobile numbers start with 6, 7, 8 or 9";
    return null;
  })();
  const formattedPhone = form.phoneDigits.length === 10
    ? `+91 ${form.phoneDigits.slice(0, 5)} ${form.phoneDigits.slice(5)}`
    : "";
  const phoneOk = !form.phoneDigits || (form.phoneDigits.length === 10 && /^[6-9]/.test(form.phoneDigits));
  const formValid = form.name.trim() && phoneOk;

  const submit = async (e) => {
    e.preventDefault();
    setTouched({ name: true, phone: true });
    if (!formValid) return;
    setBusy(true);
    try {
      await onSubmit({
        name: form.name,
        cls: form.cls,
        section: form.section,
        parent: form.phoneDigits ? formattedPhone : "",
        transport: form.transport,
      });
    } finally {
      setBusy(false);
    }
  };

  return (
    <ModalShell title="New admission" sub="Auto-assigned ID · auto fee schedule" onClose={onClose}>
      <form onSubmit={submit} className="card-body" style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        <Field label="Student full name *">
          <input
            className="input"
            autoFocus
            value={form.name}
            onChange={(e) => set("name", e.target.value)}
            onBlur={() => setTouched((t) => ({ ...t, name: true }))}
            placeholder="e.g. Anaika Sharma"
            style={touched.name && !form.name.trim() ? { borderColor: "var(--bad)" } : undefined}
          />
          {touched.name && !form.name.trim() && (
            <span style={{ fontSize: 11, color: "var(--bad)" }}>Name is required</span>
          )}
        </Field>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          <Field label="Class">
            <select className="select" value={form.cls} onChange={(e) => set("cls", e.target.value)}>
              {[1, 2, 3, 4, 5, 6, 7, 8].map((n) => <option key={n} value={n}>Class {n}</option>)}
            </select>
          </Field>
          <Field label="Section">
            <select className="select" value={form.section} onChange={(e) => set("section", e.target.value)}>
              <option value="A">Section A</option>
              <option value="B">Section B</option>
            </select>
          </Field>
        </div>

        <Field label="Parent mobile (10 digits, Indian)">
          <div style={{
            display: "flex",
            border: "1px solid",
            borderColor: phoneError ? "var(--bad)" : "var(--rule)",
            borderRadius: 9,
            background: "var(--card)",
            overflow: "hidden",
            height: 34,
          }}>
            <span style={{
              display: "inline-flex",
              alignItems: "center",
              padding: "0 10px",
              background: "var(--card-2)",
              borderRight: "1px solid var(--rule)",
              fontFamily: "var(--font-mono)",
              fontSize: 12.5,
              color: "var(--ink-3)",
            }}>+91</span>
            <input
              type="tel"
              inputMode="numeric"
              maxLength={10}
              value={form.phoneDigits}
              onChange={onPhoneChange}
              onBlur={() => setTouched((t) => ({ ...t, phone: true }))}
              placeholder="98765 43210"
              style={{
                flex: 1,
                border: 0,
                background: "transparent",
                outline: "none",
                padding: "0 10px",
                fontSize: 13,
                fontFamily: "var(--font-mono)",
                letterSpacing: "0.05em",
              }}
            />
            <span style={{
              display: "inline-flex",
              alignItems: "center",
              padding: "0 10px",
              fontSize: 11,
              fontFamily: "var(--font-mono)",
              color: form.phoneDigits.length === 10 ? "var(--ok)" : "var(--ink-4)",
            }}>{form.phoneDigits.length}/10</span>
          </div>
          {touched.phone && phoneError && (
            <span style={{ fontSize: 11, color: "var(--bad)" }}>{phoneError}</span>
          )}
          {!phoneError && formattedPhone && (
            <span style={{ fontSize: 11, color: "var(--ok)" }}>Saved as {formattedPhone}</span>
          )}
        </Field>

        <Field label="Transport route">
          <select className="select" value={form.transport} onChange={(e) => set("transport", e.target.value)}>
            <option value="—">No transport</option>
            <option value="R1">R1 · Whitefield – Marathahalli</option>
            <option value="R2">R2 · HSR – Bellandur</option>
            <option value="R3">R3 · Indiranagar – Koramangala</option>
          </select>
        </Field>

        <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 4 }}>
          <button type="button" className="btn ghost" onClick={onClose}>Cancel</button>
          <button type="submit" className="btn accent" disabled={busy || !formValid}>
            <Icon name="check" size={13} />{busy ? "Admitting…" : "Admit student"}
          </button>
        </div>
      </form>
    </ModalShell>
  );
}

function ImportModal({ onClose, onFile }) {
  const [file, setFile] = useState(null);
  const inputRef = useRef(null);
  const sampleCsv = "Name,Class,Parent,Transport\nIsha Sharma,3-A,+91 9876543210,R1\nKabir Khan,5-B,+91 9988776655,—\n";
  const downloadSample = () => {
    const blob = new Blob([sampleCsv], { type: "text/csv;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "students-template.csv"; a.click();
    URL.revokeObjectURL(url);
  };
  return (
    <ModalShell title="Import students" sub="Bulk-add via CSV · headers required (Name, Class, Parent, Transport)" onClose={onClose} width={520}>
      <div className="card-body" style={{ display: "flex", flexDirection: "column", gap: 14 }}>
        <div
          onClick={() => inputRef.current?.click()}
          style={{
            border: "2px dashed var(--rule)", borderRadius: 12, padding: 26,
            textAlign: "center", cursor: "pointer", background: "var(--card-2)",
          }}
        >
          <Icon name="upload" size={22} />
          <div style={{ marginTop: 8, fontSize: 13, fontWeight: 500 }}>
            {file ? file.name : "Click to select a CSV file"}
          </div>
          <div style={{ fontSize: 11.5, color: "var(--ink-3)", marginTop: 4 }}>
            {file ? `${(file.size / 1024).toFixed(1)} KB` : ".csv up to a few hundred rows"}
          </div>
          <input
            ref={inputRef}
            type="file"
            accept=".csv,text/csv"
            style={{ display: "none" }}
            onChange={(e) => setFile(e.target.files?.[0] || null)}
          />
        </div>
        <div style={{ fontSize: 11.5, color: "var(--ink-3)" }}>
          Need a starting point? <a onClick={downloadSample} style={{ color: "var(--accent)", cursor: "pointer", textDecoration: "underline" }}>Download a sample template</a>.
        </div>
        <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
          <button className="btn ghost" onClick={onClose}>Cancel</button>
          <button className="btn accent" disabled={!file} onClick={() => onFile(file)}>
            <Icon name="upload" size={13} />Import {file ? "" : "(pick a file)"}
          </button>
        </div>
      </div>
    </ModalShell>
  );
}

function ConfirmArchive({ student, onCancel, onConfirm }) {
  const [busy, setBusy] = useState(false);
  useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") onCancel(); };
    document.addEventListener("keydown", onKey);
    return () => document.removeEventListener("keydown", onKey);
  }, [onCancel]);

  };
  return (
    <div onClick={onCancel} style={{

            <button className="btn" style={{ background: "var(--bad)", borderColor: "var(--bad)", color: "#fff" }} onClick={submit} disabled={busy}>
              <Icon name="x" size={13} />{busy ? "Withdrawing…" : "Withdraw student"}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function ProfileModal({ student, onClose, onMessage, onTC }) {
  // Derive a stable 28-day attendance pattern from the student id
  const heatmap = useMemo(() => {
    const seedChar = student.id.charCodeAt(student.id.length - 1) || 7;
    return Array.from({ length: 28 }, (_, i) => {
      const v = ((seedChar * (i + 1) * 9301 + 49297) % 233280) / 233280;
      if (i % 7 === 6) return { v: -1 };
      if (v < 0.08) return { v: 0 };
      return { v: Math.min(4, Math.floor(v * 5)) };
    });
  }, [student.id]);

  // Activity history — synthesised from what we know about the student
  const feeTone = student.fee === "paid" ? "ok" : student.fee === "overdue" ? "bad" : "warn";
  const timeline = [
    { t: "Today", i: "fees", tone: feeTone, line: `Fee status · ${student.fee}`, sub: student.fee === "paid" ? "Last receipt auto-sent" : "Reminder scheduled" },
    { t: "Yesterday", i: "students", tone: "ok", line: "Attendance recorded", sub: `Present · ${student.attendance}% this term` },
    { t: "3 days ago", i: "book", tone: "info", line: "Homework submitted", sub: "English comprehension · on time" },
    { t: "1 week ago", i: "bus", tone: student.transport === "—" ? "" : "info", line: student.transport === "—" ? "No transport route" : `Boarded ${student.transport}`, sub: student.transport === "—" ? "Self pick-up/drop" : "Morning run · on time" },
    { t: "1 month ago", i: "enquiry", tone: "", line: `Joined ${student.joined}`, sub: "Admission confirmed · onboarding complete" },
  ];

  const phoneDigits = (student.parent || "").replace(/\D/g, "");

  useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    document.addEventListener("keydown", onKey);
    return () => document.removeEventListener("keydown", onKey);
  }, [onClose]);

  return (
    <div
      onClick={onClose}
      style={{
        position: "fixed", inset: 0, background: "rgba(20,16,10,0.45)",
        display: "grid", placeItems: "center", zIndex: 250, padding: 16, overflowY: "auto",
      }}
    >
      <div onClick={(e) => e.stopPropagation()} className="card" style={{ width: "100%", maxWidth: 720, maxHeight: "calc(100vh - 32px)", overflowY: "auto" }}>
        {/* Header strip with avatar */}
        <div style={{ padding: "22px 24px", display: "flex", alignItems: "center", gap: 16, borderBottom: "1px solid var(--rule-2)" }}>
          <div style={{
            width: 56, height: 56, borderRadius: 14,
            background: "linear-gradient(135deg, var(--accent), var(--accent-2))",
            color: "var(--accent-ink)",
            display: "grid", placeItems: "center",
            fontWeight: 600, fontSize: 20,
          }}>
            {student.name.split(" ").map((n) => n[0]).join("")}
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
              <span style={{ fontSize: 20, fontWeight: 600, letterSpacing: "-0.01em", fontFamily: "var(--font-serif)" }}>{student.name}</span>
              {student.__added && (
                <span className="chip ok" style={{ fontSize: 10, height: 20 }}><span className="dot" />new admission</span>
              )}
            </div>
            <div style={{ color: "var(--ink-3)", fontSize: 12.5, marginTop: 4, display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center" }}>
              <span className="mono">{student.id}</span>
              <span className="meta-dot">·</span>
              <span>Class {student.cls}</span>
              <span className="meta-dot">·</span>
              <span>Joined {student.joined}</span>
            </div>
          </div>
          <button className="icon-btn" onClick={onClose} style={{ alignSelf: "flex-start" }}>
            <Icon name="x" size={14} />
          </button>
        </div>

        {/* Stats row */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", borderBottom: "1px solid var(--rule-2)" }}>
          <Stat label="Attendance" value={`${student.attendance}%`} tone={student.attendance < 85 ? "warn" : "ok"} />
          <Stat label="Fee" value={student.fee.charAt(0).toUpperCase() + student.fee.slice(1)} tone={feeTone} />
          <Stat label="Transport" value={student.transport} />
          <Stat label="Section" value={student.cls.split("-")[1] || "—"} />
        </div>

        {/* Body — two columns */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 0 }}>
          {/* Left: Parent contact + transport */}
          <div style={{ padding: "20px 22px", borderRight: "1px solid var(--rule-2)", display: "flex", flexDirection: "column", gap: 16 }}>
            <ProfileSection title="Parent contact">
              {student.parent && student.parent !== "—" ? (
                <>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13.5 }}>
                    <Icon name="phone" size={14} style={{ color: "var(--ink-3)" }} />
                    <span className="mono">{student.parent}</span>
                  </div>
                  <div style={{ display: "flex", gap: 6, marginTop: 10, flexWrap: "wrap" }}>
                    <button className="btn sm" onClick={() => window.open(`tel:${student.parent.replace(/\s/g, "")}`, "_self")}>
                      <Icon name="phone" size={11} />Call
                    </button>
                    <button className="btn sm accent" onClick={onMessage}>
                      <Icon name="whatsapp" size={11} />WhatsApp
                    </button>
                    <button className="btn sm" onClick={() => window.open(`sms:${student.parent.replace(/\s/g, "")}`, "_self")}>
                      <Icon name="sms" size={11} />SMS
                    </button>
                  </div>
                </>
              ) : (
                <div style={{ fontSize: 12.5, color: "var(--ink-3)" }}>No parent contact on file.</div>
              )}
            </ProfileSection>

            <ProfileSection title="Attendance · 28-day">
              <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4 }}>
                {["M", "T", "W", "T", "F", "S", "S"].map((d, i) => (
                  <div key={i} style={{ fontSize: 9.5, color: "var(--ink-4)", textAlign: "center" }}>{d}</div>
                ))}
                {heatmap.map((c, i) => {
                  const bg =
                    c.v === -1 ? "var(--rule-2)" :
                    c.v === 0 ? "var(--bad)" :
                    `color-mix(in oklch, var(--accent) ${40 + c.v * 15}%, var(--rule-2))`;
                  return <div key={i} className="hm-cell" style={{ background: bg, opacity: c.v === -1 ? 0.5 : 1 }} />;
                })}
              </div>
              <div style={{ fontSize: 11, color: "var(--ink-3)", marginTop: 8 }}>
                {heatmap.filter((c) => c.v > 0).length} present · {heatmap.filter((c) => c.v === 0).length} absent · {heatmap.filter((c) => c.v === -1).length} off days
              </div>
            </ProfileSection>
          </div>

          {/* Right: Timeline */}
          <div style={{ padding: "20px 22px", display: "flex", flexDirection: "column", gap: 10 }}>
            <ProfileSection title="Recent activity">
              <div style={{ display: "flex", flexDirection: "column" }}>
                {timeline.map((row, i) => (
                  <div key={i} style={{
                    display: "grid",
                    gridTemplateColumns: "28px 1fr auto",
                    gap: 10,
                    padding: "9px 0",
                    borderBottom: i < timeline.length - 1 ? "1px solid var(--rule-2)" : "none",
                  }}>
                    <div className={`act-ico ${row.tone || ""}`} style={{ width: 26, height: 26 }}>
                      <Icon name={row.i} size={12} />
                    </div>
                    <div style={{ minWidth: 0 }}>
                      <div style={{ fontSize: 12.5 }}>{row.line}</div>
                      <div style={{ fontSize: 11, color: "var(--ink-3)" }}>{row.sub}</div>
                    </div>
                    <div style={{ fontSize: 11, color: "var(--ink-4)", fontFamily: "var(--font-mono)" }}>{row.t}</div>
                  </div>
                ))}
              </div>
            </ProfileSection>
          </div>
        </div>

        {/* Footer actions */}
        <div style={{ padding: "14px 22px", borderTop: "1px solid var(--rule-2)", display: "flex", gap: 8, justifyContent: "flex-end" }}>
          <button className="btn" onClick={onTC}><Icon name="book" size={12} />Issue TC</button>
          {phoneDigits && (
            <button className="btn" onClick={onMessage}><Icon name="whatsapp" size={12} />Message parent</button>
          )}
          <button className="btn accent" onClick={onClose}>Close</button>
        </div>
      </div>
    </div>
  );
}

function Stat({ label, value, tone }) {
  const color = tone === "ok" ? "var(--ok)" : tone === "warn" ? "var(--warn)" : tone === "bad" ? "var(--bad)" : "var(--ink)";
  return (
    <div style={{ padding: "14px 18px", borderRight: "1px solid var(--rule-2)" }}>
      <div style={{ fontSize: 10, color: "var(--ink-3)", textTransform: "uppercase", letterSpacing: "0.08em", fontWeight: 500 }}>{label}</div>
      <div style={{ fontFamily: "var(--font-serif)", fontSize: 22, marginTop: 4, letterSpacing: "-0.02em", color }}>{value}</div>
    </div>
  );
}

function ProfileSection({ title, children }) {
  return (
    <div>
      <div style={{ fontSize: 10.5, color: "var(--ink-3)", textTransform: "uppercase", letterSpacing: "0.09em", fontWeight: 500, marginBottom: 10 }}>
        {title}
      </div>
      {children}
    </div>
  );
}

function Field({ label, children }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
      <span style={{ fontSize: 11, color: "var(--ink-3)", textTransform: "uppercase", letterSpacing: "0.06em", fontWeight: 500 }}>{label}</span>
      {children}
    </div>
  );
}

window.ScreenStudents = ScreenStudents;
})();
var ScreenStudents = window.ScreenStudents;

            {routes.map((r, i) => {
              const boarded = r.stops.reduce((a, s) => a + s.boarded, 0);

              const active = i === routeIdx;
              return (
                <div
                  key={r.code}

                  className="lrow"
                  style={{ cursor: "pointer", background: active ? "var(--accent-soft)" : undefined, borderLeft: active ? "3px solid var(--accent)" : "3px solid transparent" }}
                >
                  <div style={{ width: 44, height: 44, borderRadius: 10, background: "var(--card-2)", display: "grid", placeItems: "center", flexShrink: 0 }}>
                    <Icon name="bus" size={20} />
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>

          </div>
          <button className="btn">
            <Icon name="download" size={13} />
            Board pack
          </button>
        </div>
      </div>

      <div className="grid g-4" style={{ marginBottom: 20 }}>
        <KPI label="Students" value={TRUST_KPIS.students.value} delta={TRUST_KPIS.students.delta} deltaDir="up" sub={TRUST_KPIS.students.sub} puck="mint" puckIcon="students" />
        <KPI label="Fee collection" value={TRUST_KPIS.collected.value} delta={TRUST_KPIS.collected.delta} deltaDir="up" sub={TRUST_KPIS.collected.sub} puck="peach" puckIcon="fees" />
        <KPI label="Donations YTD" value={TRUST_KPIS.donations.value} delta={TRUST_KPIS.donations.delta} deltaDir="up" sub={TRUST_KPIS.donations.sub} puck="cream" puckIcon="donors" />
        <KPI label="Parent NPS" value={TRUST_KPIS.teacherNPS.value} delta={TRUST_KPIS.teacherNPS.delta} deltaDir="up" sub={TRUST_KPIS.teacherNPS.sub} puck="sky" puckIcon="heart" />
      </div>

      <div className="grid g-12" style={{ marginBottom: 20 }}>
        <div className="card col-8">
          <div className="card-head">
            <div>
              <div className="card-title">Schools</div>
              <div className="card-sub">Tap any row to drill into a school</div>
            </div>
            <div className="card-actions">
              <button className="btn sm">
                <Icon name="plus" size={12} />
                Add school
              </button>
            </div>
          </div>
          <div>
            {SCHOOLS.length === 0 && (
              <div className="empty">No schools added to the trust yet.</div>
            )}
            {SCHOOLS.map((s) => (
              <div className="school-row" key={s.id}>
                <div className={`school-puck ${s.puck}`}>
                  <Icon name="school" size={18} />
                </div>
                <div className="school-info">
                  <div className="name">{s.name}</div>
                  <div className="meta">
                    {s.city} · {s.students} students · {s.fees}% fees · {s.wellness}% wellness
                  </div>
                </div>
                <div style={{ width: 140 }}>
                  <div className="dual-bar">
                    <span className="g" style={{ width: s.fees + "%" }} />
                    <span className="r" style={{ width: 100 - s.fees + "%" }} />
                  </div>
                  <div style={{ fontSize: 10.5, color: "var(--ink-3)", marginTop: 4, fontFamily: "var(--font-mono)" }}>{s.fees}% collected</div>
                </div>
                <span className="chip ok">
                  <span className="dot" />
                  {s.status}
                </span>
                <Icon name="chevronRight" size={14} style={{ color: "var(--ink-4)" }} />
              </div>
            ))}
          </div>
        </div>

        <div className="card col-4 ai-brief">
          <div className="card-body" style={{ position: "relative", zIndex: 1 }}>
            <div className="eyebrow">
              <Icon name="sparkles" size={11} /> Briefing
            </div>
            <div className="headline">Today across the trust.</div>
            {AI_BRIEF.length === 0 ? (
              <div style={{ color: "rgba(255,255,255,0.6)", fontSize: 12.5, lineHeight: 1.5 }}>
                Briefing items will appear here once there's enough activity to summarise.
              </div>
            ) : AI_BRIEF.map((t, i) => (
              <div className="insight-row" key={i}>
                <div className="n">0{i + 1}</div>
                <div>{t}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div className="grid g-12" style={{ marginBottom: 20 }}>
        <div className="card col-5">
          <div className="card-head">
            <div>
              <div className="card-title">Anomalies spotted</div>
              <div className="card-sub">Patterns unusual for this week</div>
            </div>
            <span className="chip accent">
              <span className="dot" />3 new
            </span>
          </div>
          <div>
            {ANOMALIES.length === 0 && (
              <div className="empty">No anomalies detected.</div>
            )}
            {ANOMALIES.map((a, i) => (
              <div key={i} className="lrow">
                <div className={`act-ico ${a.tone}`}>
                  <Icon name={a.tone === "bad" ? "warning" : a.tone === "warn" ? "trending" : "spark"} size={13} />
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 13 }}>{a.t}</div>
                  <div style={{ fontSize: 11.5, color: "var(--ink-3)", marginTop: 2 }}>{a.s}</div>
                </div>
                <button className="btn sm ghost">
                  <Icon name="chevronRight" size={11} />
                </button>
              </div>
            ))}
          </div>
        </div>

        <div className="card col-4">
          <div className="card-head">
            <div>
              <div className="card-title">Donation pipeline</div>
              <div className="card-sub">₹1.24 Cr in motion</div>
            </div>
          </div>
          <div className="card-body" style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            {DONATION_PIPELINE.length === 0 && (
              <div className="empty" style={{ padding: 12 }}>No pipeline yet.</div>
            )}
            {DONATION_PIPELINE.map((p, i) => {
              const max = Math.max(...DONATION_PIPELINE.map((x) => x.amount)) || 1;
              return (
                <div key={p.stage}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5, alignItems: "baseline" }}>
                    <span style={{ fontSize: 12.5, fontWeight: 500 }}>
                      {p.stage} <span style={{ color: "var(--ink-3)", fontWeight: 400 }}>· {p.count}</span>
                    </span>
                    <span className="mono" style={{ fontSize: 13, fontWeight: 500 }}>
                      {moneyK(p.amount)}
                    </span>
                  </div>
                  <div className="bar thick">
                    <span style={{ width: (p.amount / max) * 100 + "%", background: i === 3 ? "var(--ok)" : "var(--accent)" }} />
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        <div className="card col-3">
          <div className="card-head">
            <div>
              <div className="card-title">Compliance</div>
              <div className="card-sub">Q1 · FY26</div>
            </div>
          </div>
          <div className="card-body" style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            {COMPLIANCE.length === 0 && (
              <div className="empty" style={{ padding: 12 }}>No compliance items tracked.</div>
            )}
            {COMPLIANCE.map((c) => (
              <div key={c.t}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12.5, marginBottom: 5 }}>
                  <span>{c.t}</span>
                  <span className="mono" style={{ color: c.tone === "ok" ? "var(--ok)" : "var(--warn)", fontWeight: 500 }}>
                    {c.v}/{c.goal}
                  </span>
                </div>
                <div className="bar">
                  <span style={{ width: (c.v / c.goal) * 100 + "%", background: c.tone === "ok" ? "var(--ok)" : "var(--warn)" }} />
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

window.ScreenTrust = ScreenTrust;
})();
var ScreenTrust = window.ScreenTrust;

//                                                                               
//   §26  Users screen                                                           
//   components/screens/Users.jsx — wrapped in an IIFE to keep local helpers scoped.
//                                                                               
// ══════════════════════════════════════════════════════════════════════════════

;(function(){

const ROLE_DESC = {
  "Super Admin": "Full trust-wide access incl. finance, users, audit.",
  "Principal": "Full access to their school · cannot edit trust settings.",
  "Academic Director": "Academic modules only · no finance writes.",
  "Accountant": "Finance modules · issue receipts · read-only students.",
  "Teacher": "Own classes + students · homework · messaging.",
  "Transport lead": "Routes, buses, drivers, stops, live boarding.",
  "Parent": "Their child(ren) only · fees, academics, messages.",
  "Intern": "Limited access under a mentor.",
};

function ScreenUsers({ E }) {
  const users = E.USERS || [];

  // Roll-up: count users per role from the live list
  const counts = users.reduce((m, u) => ({ ...m, [u.role]: (m[u.role] || 0) + 1 }), {});
  const rolesUsed = Object.keys(ROLE_DESC).map((role) => ({
    role,
    count: counts[role] || 0,
    desc: ROLE_DESC[role],
  }));

  return (
    <div className="page">
      <div className="page-head">
        <div>
          <div className="page-eyebrow">Governance</div>
          <div className="page-title">Users <span className="amber">& roles</span></div>
          <div className="page-sub">{users.length} user account{users.length === 1 ? "" : "s"} across {Object.keys(counts).length || "—"} role{Object.keys(counts).length === 1 ? "" : "s"}.</div>
        </div>
        <div className="page-actions">
          <button className="btn"><Icon name="download" size={13} />Export CSV</button>
          <button className="btn accent"><Icon name="plus" size={13} />Invite user</button>
        </div>
      </div>

      <div className="grid g-12" style={{ marginBottom: 18 }}>
        <div className="card col-8">
          <div className="card-head">
            <div><div className="card-title">Admin & staff</div><div className="card-sub">{users.length} on file</div></div>
            <div className="card-actions">
              <div className="input" style={{ display: "inline-flex", alignItems: "center", gap: 6, width: 200, padding: "0 10px" }}>
                <Icon name="search" size={13} style={{ color: "var(--ink-3)" }} />
                <input style={{ border: 0, background: "transparent", outline: "none", fontSize: 12, flex: 1 }} placeholder="Search name or email" />
              </div>
            </div>
          </div>
          <div style={{ overflowX: "auto" }}>
            <table className="table">
              <thead><tr><th>User</th><th>Role</th><th>School</th><th>MFA</th><th>Last active</th><th></th></tr></thead>
              <tbody>
                {users.length === 0 && (
                  <tr><td colSpan={6} className="empty">No users invited yet. Add the first one with “Invite user”.</td></tr>
                )}
                {users.map((u) => (
                  <tr key={u.id || u.email}>
                    <td>
                      <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                        <AvatarChip initials={u.name.split(" ").map((n) => n[0]).join("")} />
                        <div>
                          <div style={{ fontSize: 12.5, fontWeight: 500 }}>{u.name}</div>
                          <div style={{ fontSize: 11, color: "var(--ink-4)" }}>{u.email}</div>
                        </div>
                      </div>
                    </td>
                    <td><span className="chip">{u.role}</span></td>
                    <td style={{ fontSize: 12 }}>{u.school || "—"}</td>
                    <td>
                      {u.mfa
                        ? <span className="chip ok"><Icon name="check" size={10} />On</span>
                        : <span className="chip warn"><span className="dot" />Off</span>}
                    </td>
                    <td style={{ fontSize: 12, color: "var(--ink-3)" }}>{u.lastSeen || u.last || "—"}</td>
                    <td><button className="icon-btn" style={{ width: 24, height: 24 }}><Icon name="more" size={13} /></button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
        <div className="card col-4">
          <div className="card-head">
            <div><div className="card-title">Roles</div><div className="card-sub">Edit permissions per role</div></div>
          </div>
          <div>
            {rolesUsed.map((r) => (
              <div className="lrow" key={r.role}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 13, fontWeight: 500 }}>{r.role} <span style={{ color: "var(--ink-4)", fontWeight: 400, marginLeft: 4 }}>· {r.count}</span></div>
                  <div style={{ fontSize: 11.5, color: "var(--ink-3)", marginTop: 2 }}>{r.desc}</div>
                </div>
                <button className="btn sm ghost"><Icon name="chevronRight" size={11} /></button>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

window.ScreenUsers = ScreenUsers;
})();
var ScreenUsers = window.ScreenUsers;

//                                                                               
//   §27  AppShell                                                               
//   components/AppShell.jsx — top-level layout + screen router.                 
//                                                                               
// ══════════════════════════════════════════════════════════════════════════════


const SCREENS = {
  dashboard: ScreenDashboard,
  trust: ScreenTrust,
  schools: ScreenSchools,
  money: ScreenMoney,
  fees: ScreenFees,
  students: ScreenStudents,
  academic: ScreenAcademic,
  staff: ScreenStaff,
  transport: ScreenTransport,
  inventory: ScreenInventory,
  communication: ScreenCommunication,
  enquiries: ScreenEnquiries,
  complaints: ScreenComplaints,
  donors: ScreenDonors,
  automation: ScreenAutomation,
  users: ScreenUsers,
  audit: ScreenAudit,
  settings: ScreenSettings,
};

const DEFAULT_SCREEN_BY_ROLE = {
  super: "trust",
  principal: "dashboard",
  teacher: "academic",
  parent: "dashboard",
};

const DEFAULT_SETTINGS = {
  theme: "light",
  role: "principal",
  view: "desktop",
  density: "compact",
  sidebar: "expanded",
  accent: "amber",
};

function AppShell({ initialData }) {
  const [data, setData] = useState(initialData);
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [current, setCurrent] = useState("dashboard");
  const [showTweaks, setShowTweaks] = useState(false);
  const [hydrated, setHydrated] = useState(false);

  // Restore from localStorage on mount
  useEffect(() => {
    try {
      const saved = JSON.parse(localStorage.getItem("vidyalaya360.tweaks") || "null");
      if (saved) setSettings((s) => ({ ...s, ...saved }));
      const screen = localStorage.getItem("vidyalaya360.screen");
      if (screen && SCREENS[screen]) setCurrent(screen);
      else setCurrent(DEFAULT_SCREEN_BY_ROLE[(saved && saved.role) || "principal"] || "dashboard");
    } catch {}
    setHydrated(true);
  }, []);

  useEffect(() => {
    if (!hydrated) return;
    localStorage.setItem("vidyalaya360.tweaks", JSON.stringify(settings));
  }, [settings, hydrated]);

  useEffect(() => {
    if (!hydrated) return;
    localStorage.setItem("vidyalaya360.screen", current);
  }, [current, hydrated]);

  // Snap to default screen when role changes if current isn't in this role's nav
  useEffect(() => {
    if (!hydrated) return;
    const allowed = (NAV_BY_ROLE[settings.role] || []).filter((n) => !n.section).map((n) => n.id);
    if (!allowed.includes(current)) setCurrent(DEFAULT_SCREEN_BY_ROLE[settings.role] || "dashboard");
  }, [settings.role]); // eslint-disable-line react-hooks/exhaustive-deps

  // Cmd/Ctrl + K toggles tweaks panel
  useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && (e.key === "k" || e.key === "K")) {
        e.preventDefault();
        setShowTweaks((s) => !s);
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  const setSetting = (k, v) => setSettings((s) => ({ ...s, [k]: v }));
  const refresh = async () => {
    try {
      const json = await store.readAllData();
      setData({
        KPIS: json.kpis,
        CLASSES: json.classes,
        CLASS_STRENGTH: json.classStrength,
        RECENT_FEES: json.recentFees,
        PENDING_FEES: json.pendingFees,
        ACTIVITIES: json.activities,
        ROUTES: json.routes,
        COMPLAINTS: json.complaints,
        ENQUIRIES: json.enquiries,
        INVENTORY: json.inventory,
        STAFF: json.staff,
        DONORS: json.donors,
        INCOME_SERIES: json.incomeSeries,
        AUTOMATIONS: json.automations,
        SCHOOLS: json.schools,
        TRUST_KPIS: json.trustKpis,
        ANOMALIES: json.anomalies,
        DONATION_PIPELINE: json.donationPipeline,
        COMPLIANCE: json.compliance,
        AI_BRIEF: json.aiBrief,
        ROLES: json.roles,
        USERS: json.users,
        AUDIT: json.audit,
        ADDED_STUDENTS: json.addedStudents || [],
        ARCHIVED_STUDENTS: json.archivedStudents || [],
        DAILY_LOGS: json.dailyLogs || [],
      });
    } catch {}
  };

  const role = settings.role;
  const view = settings.view;
  const Comp = SCREENS[current] || SCREENS.dashboard;

  // For the Parent role, restrict every piece of data to this parent's child.
  // Demo picks the first active student as "this parent's child"; in a
  // real deployment the parent would be authenticated and linked to a
  // specific student_id on the students table.
  const scopedData = (() => {
    if (role !== "parent") return data;
    const myChild = (data.ADDED_STUDENTS || [])[0];
    if (!myChild) return { ...data, ADDED_STUDENTS: [], PENDING_FEES: [], RECENT_FEES: [], DAILY_LOGS: [], ROUTES: [] };
    return {
      ...data,
      ADDED_STUDENTS:    [myChild],
      ARCHIVED_STUDENTS: [],
      PENDING_FEES:      (data.PENDING_FEES || []).filter((f) => f.id === myChild.id),
      RECENT_FEES:       (data.RECENT_FEES  || []).filter((f) => f.id === myChild.id),
      DAILY_LOGS:        (data.DAILY_LOGS   || []).filter((l) => l.studentId === myChild.id),
      ROUTES:            (data.ROUTES || []).filter((r) => r.code === myChild.transport),
      // Hide all admin-level data from the parent view.
      STAFF: [], AUDIT: [], INVENTORY: [], DONORS: [],
      ENQUIRIES: [], COMPLAINTS: [], AUTOMATIONS: [],
      SCHOOLS: [], USERS: [], ANOMALIES: [], DONATION_PIPELINE: [],
      COMPLIANCE: [], AI_BRIEF: [],
    };
  })();

  if (view === "mobile") {
    return (
      <div
        data-theme={settings.theme}
        data-density={settings.density}
        data-sidebar="expanded"
        style={{ minHeight: "100vh", display: "grid", placeItems: "center", padding: "32px 16px", background: "var(--bg-2)" }}
      >
        <MobileShell current={current} setCurrent={setCurrent} role={role}>
          <Comp E={scopedData} refresh={refresh} role={role} />
        </MobileShell>
        <RolePill role={role} setRole={(r) => setSetting("role", r)} />
        <ViewToggle view={view} setView={(v) => setSetting("view", v)} />
        <Tweaks show={showTweaks} settings={settings} setSetting={setSetting} />
      </div>
    );
  }

  return (
    <div className="app" data-theme={settings.theme} data-density={settings.density} data-sidebar={settings.sidebar}>
      <Sidebar current={current} setCurrent={setCurrent} role={role} />
      <div className="main">
        <div className="topbar">
          <button
            className="icon-btn"
            onClick={() => setSetting("sidebar", settings.sidebar === "collapsed" ? "expanded" : "collapsed")}
            title="Toggle sidebar"
          >
            <Icon name="menu" size={15} />
          </button>
          <div className="topbar-search">
            <Icon name="search" size={14} />
            <input placeholder={role === "parent" ? "Search fees, messages, transport…" : "Search students, fees, staff, routes…"} />
            <span className="kbd">⌘F</span>
          </div>
          <div className="topbar-right">
            {role !== "parent" && (
              <span className="live-pill">
                <span className="pulse-dot" />
                Live
              </span>
            )}
            <button
              className="icon-btn"
              onClick={() => setSetting("theme", settings.theme === "dark" ? "light" : "dark")}
              title="Theme"
            >
              <Icon name={settings.theme === "dark" ? "sun" : "moon"} size={15} />
            </button>
            <button className="icon-btn has-dot" title="Notifications">
              <Icon name="bell" size={15} />
            </button>
            <button className="icon-btn" onClick={() => setShowTweaks((s) => !s)} title="Tweaks">
              <Icon name="sliders" size={15} />
            </button>
          </div>
        </div>

        <Comp E={data} refresh={refresh} role={role} />
      </div>

      <RolePill role={role} setRole={(r) => setSetting("role", r)} />
      <ViewToggle view={view} setView={(v) => setSetting("view", v)} />
      <Tweaks show={showTweaks} settings={settings} setSetting={setSetting} />
    </div>
  );
}

function RolePill({ role, setRole }) {
  return (
    <div className="role-pill">
      {ROLES.map((r) => (
        <button key={r.k} className={role === r.k ? "active" : ""} onClick={() => setRole(r.k)}>
          <Icon name={r.icon} size={12} />
          {r.label}
        </button>
      ))}
    </div>
  );
}

function ViewToggle({ view, setView }) {
  return (
    <div className="view-toggle">
      <button className={view === "desktop" ? "active" : ""} onClick={() => setView("desktop")}>
        Desktop
      </button>
      <button className={view === "mobile" ? "active" : ""} onClick={() => setView("mobile")}>
        Mobile
      </button>
    </div>
  );
}




// ══════════════════════════════════════════════════════════════════════════════
//                                                                               
//   §28  Bootstrap                                                              
//   Root <App/>: loads data from the store, then mounts AppShell.               
//                                                                               
// ══════════════════════════════════════════════════════════════════════════════


const App = () => {
  const [data, setData] = React.useState(null);
  const refresh = React.useCallback(async () => setData(await store.readAllData()), []);
  React.useEffect(() => { refresh(); }, [refresh]);
  if (!data) return null;
  return <AppShell initialData={data} refresh={refresh} />;
};

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);

</script>
