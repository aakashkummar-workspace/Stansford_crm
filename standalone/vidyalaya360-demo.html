    Self-contained demo build — open this file in any modern browser.

    HOW IT WORKS
      · Fonts load from Google Fonts (one network request on first open).
      · React 18 + Babel-standalone load from unpkg (transforms the JSX
        below in the browser — takes ~1–2 s on first load, then caches).
      · All application code is inlined in the Babel script block near the
        bottom of this file. Scroll down to read it section by section.
      · Data persists to localStorage ('vidyalaya360.db'). Open DevTools →
        Application → Local Storage to inspect / clear.

    NOT IN THIS FILE
      · No server, no API routes, no Supabase — this is the portable demo.
      · For the fullstack (Next.js + Supabase) version see the repository:
        github.com/aakashkummar-workspace/Stansford_crm

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Stansford International HR.Sec.School · Vidyalaya360 (demo)</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>

<style>
/* ==========================================================================
   Stansford · Vidyalaya360-inspired design
   Paper · warm cream · serif display · amber accent
   ========================================================================== */

:root {
  /* Paper / warm cream palette */
  --bg:          #f4efe6;
  --bg-2:        #ebe4d6;
  --card:        #fbf8f1;
  --card-2:      #f6f1e5;
  --rule:        #e4dcc9;
  --rule-2:      #eae2d0;

  --ink:         #1a1612;
  --ink-2:       #3d362d;
  --ink-3:       #7a6f61;
  --ink-4:       #a89d8a;

  /* Amber accent (signature "in one glance" color) */
  --accent:      #c8510a;
  --accent-2:    #a3420a;
  --accent-soft: #fbeada;
  --accent-ink:  #ffffff;

  /* Soft pastel icon backgrounds */
  --mint:        #d8ebd4;
  --mint-ink:    #4a7a54;
  --peach:       #f7dcc4;
  --peach-ink:   #b2622a;
  --cream:       #f0e4c8;
  --cream-ink:   #8a6f2e;
  --sky:         #d6e4ed;
  --sky-ink:     #4a6c85;
  --rose:        #f2d5d2;
  --rose-ink:    #a0514a;
  --lilac:       #e4dbec;
  --lilac-ink:   #6a548a;

  /* Semantic */
  --ok:          #4a7a54;
  --ok-soft:     #dfecd8;
  --warn:        #b07c28;
  --warn-soft:   #f3e6c8;
  --bad:         #b44a3c;
  --bad-soft:    #f3d8d2;
  --info:        #4a6c85;
  --info-soft:   #d8e4ec;
  --teal:        #3a7a6c;
  --teal-soft:   #d4e7e3;

  --radius:      14px;
  --radius-sm:   8px;
  --radius-lg:   20px;

  --shadow-sm: 0 1px 2px rgba(58, 42, 20, 0.04);
  --shadow:    0 2px 6px rgba(58, 42, 20, 0.05), 0 1px 2px rgba(58, 42, 20, 0.03);
  --shadow-lg: 0 12px 32px rgba(58, 42, 20, 0.1), 0 2px 6px rgba(58, 42, 20, 0.06);

  --font-sans:   "Outfit", system-ui, -apple-system, Segoe UI, sans-serif;
  --font-serif:  "DM Serif Display", Georgia, serif;
  --font-mono:   "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
}

[data-theme="dark"] {
  --bg:         #1a1612;
  --bg-2:       #14110d;
  --card:       #221d17;
  --card-2:     #1e1a14;
  --rule:       #3a322a;
  --rule-2:     #2e2820;
  --ink:        #f4efe6;
  --ink-2:      #d8ceb8;
  --ink-3:      #a09685;
  --ink-4:      #6a6254;
  --accent:     #e88740;
  --accent-2:   #f09a58;
  --accent-soft:#3a2818;
  --accent-ink: #1a1612;
  --mint:       #2a4432;   --mint-ink:  #9bc6a4;
  --peach:      #4a3420;   --peach-ink: #e8b088;
  --cream:      #3e3420;   --cream-ink: #d4b470;
  --sky:        #2a3a48;   --sky-ink:   #a0c0d4;
  --rose:       #4a2e2a;   --rose-ink:  #e0a8a0;
  --lilac:      #3a2e48;   --lilac-ink: #bca8d0;
  --ok-soft:    #2a3a2e;
  --warn-soft:  #3a3020;
  --bad-soft:   #3a2420;
  --info-soft:  #2a3540;
  --teal-soft:  #2a3a36;
  --shadow-sm:  0 1px 2px rgba(0, 0, 0, 0.3);
  --shadow:     0 2px 8px rgba(0, 0, 0, 0.4);
  --shadow-lg:  0 16px 40px rgba(0, 0, 0, 0.6);
}

[data-density="compact"]  { --pad: 12px; --gap: 12px; --page-pad: 20px; }
[data-density="balanced"], [data-density="comfortable"] { --pad: 18px; --gap: 16px; --page-pad: 28px; }
[data-density="spacious"] { --pad: 22px; --gap: 20px; --page-pad: 36px; }

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--ink);
  font-size: 13.5px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* Subtle paper grain */
body.paper, body {
  background-image:
    radial-gradient(circle at 20% 30%, rgba(200, 170, 120, 0.05) 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(180, 140, 80, 0.04) 0%, transparent 40%);
}
[data-theme="dark"] body { background-image: none; }

button { font-family: inherit; color: inherit; border: 0; background: none; cursor: pointer; padding: 0; }
input, select, textarea { font-family: inherit; color: inherit; }
a { color: inherit; text-decoration: none; }

.mono { font-family: var(--font-mono); font-feature-settings: "tnum"; }
.serif { font-family: var(--font-serif); font-weight: 400; letter-spacing: -0.01em; }

/* ---- Shell ---- */
.app { display: grid; grid-template-columns: auto 1fr; min-height: 100vh; }

.sidebar {
  width: 232px;
  background: transparent;
  border-right: 1px solid var(--rule);
  position: sticky; top: 0; height: 100vh;
  display: flex; flex-direction: column;
  padding: 20px 14px 12px;
  overflow: hidden;
}
[data-sidebar="collapsed"] .sidebar { width: 58px; padding: 20px 6px 12px; }
[data-sidebar="collapsed"] .side-lbl,
[data-sidebar="collapsed"] .side-section,
[data-sidebar="collapsed"] .side-foot > .side-lbl,
[data-sidebar="collapsed"] .brand-text,
[data-sidebar="collapsed"] .side-kbd,
[data-sidebar="collapsed"] .side-badge { display: none; }
[data-sidebar="collapsed"] .side-item { justify-content: center; padding: 8px 0; gap: 0; }
[data-sidebar="collapsed"] .brand { justify-content: center; padding: 0 0 20px; }
[data-sidebar="collapsed"] .side-foot { justify-content: center; padding: 12px 0; }

.brand { display: flex; align-items: center; gap: 11px; padding: 0 8px 22px; }
.brand-mark {
  width: 32px; height: 32px; border-radius: 9px;
  background: linear-gradient(135deg, var(--ok), #2f6048);
  color: #fff;
  display: grid; place-items: center;
  font-weight: 600; font-size: 14px;
  font-family: var(--font-serif);
  flex-shrink: 0;
}
.brand-text { line-height: 1.1; min-width: 0; }
.brand-text .b1 {
  font-family: var(--font-serif); font-size: 17px; letter-spacing: -0.015em;
  color: var(--ink);
}
.brand-text .b1 .num { color: var(--accent); }
.brand-text .b2 {
  color: var(--ink-3); font-size: 9.5px; margin-top: 2px;
  text-transform: uppercase; letter-spacing: 0.1em; font-weight: 500;
}

.side-section {
  color: var(--ink-4);
  text-transform: uppercase;
  font-size: 9.5px;
  letter-spacing: 0.1em;
  padding: 18px 12px 6px;
  font-weight: 500;
}
.side-item {
  display: flex; align-items: center; gap: 11px;
  height: 36px;
  padding: 0 12px;
  border-radius: 9px;
  color: var(--ink-2);
  font-size: 13.5px;
  cursor: pointer;
  user-select: none;
  position: relative;
  font-weight: 400;
  margin-bottom: 1px;
}
.side-item:hover { background: var(--card); color: var(--ink); }
.side-item.active {
  background: var(--card);
  color: var(--ink);
  font-weight: 500;
  box-shadow: var(--shadow-sm);
}
.side-item.active::before {
  content: ""; position: absolute; left: -14px; top: 8px; bottom: 8px;
  width: 3px; border-radius: 2px; background: var(--accent);
}
.side-item.active .side-icon { color: var(--accent); }
.side-icon { width: 16px; height: 16px; flex-shrink: 0; color: var(--ink-3); }
.side-badge {
  margin-left: auto;
  background: var(--accent-soft);
  color: var(--accent);
  padding: 0 7px; height: 18px;
  display: inline-flex; align-items: center;
  border-radius: 6px;
  font-size: 10.5px; font-weight: 600;
  font-family: var(--font-mono);
}
.side-badge.alert { background: var(--bad-soft); color: var(--bad); }
.side-kbd { margin-left: auto; font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-4); }
.side-lbl { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.side-foot {
  margin-top: auto; padding: 12px 8px;
  border-top: 1px solid var(--rule);
  display: flex; align-items: center; gap: 10px;
  background: var(--card);
  border-radius: 12px;
  margin: 12px 0 0;
  padding: 10px 12px;
  box-shadow: var(--shadow-sm);
}
.avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: #fff;
  display: grid; place-items: center;
  font-weight: 600; font-size: 11.5px;
  flex-shrink: 0;
  letter-spacing: -0.01em;
}

/* ---- Main ---- */
.main { min-width: 0; display: flex; flex-direction: column; }

.topbar {
  height: 56px;
  border-bottom: 1px solid var(--rule);
  background: var(--bg);
  display: flex; align-items: center;
  padding: 0 22px;
  gap: 14px;
  position: sticky; top: 0; z-index: 5;
  backdrop-filter: saturate(1.2);
}

.topbar-search {
  flex: 1; max-width: 460px; min-width: 0;
  height: 34px;
  background: var(--card);
  border: 1px solid var(--rule);
  border-radius: 999px;
  padding: 0 14px;
  display: flex; align-items: center; gap: 9px;
  color: var(--ink-3);
  font-size: 12.5px;
  transition: border-color .12s, box-shadow .12s;
}
.topbar-search:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.topbar-search input { border: 0; background: transparent; flex: 1; min-width: 0; outline: none; font-size: 13px; color: var(--ink); }
.topbar-search input::placeholder { color: var(--ink-3); }
.topbar-search .kbd {
  background: var(--bg-2); border: 0;
  border-radius: 5px; padding: 2px 6px;
  font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-3);
  font-weight: 500;
}
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 6px; }
.icon-btn {
  width: 32px; height: 32px; border-radius: 8px;
  display: grid; place-items: center; color: var(--ink-2);
  position: relative;
}
.icon-btn:hover { background: var(--card); color: var(--ink); }
.icon-btn.has-dot::after {
  content: ""; position: absolute;
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent);
  top: 8px; right: 8px;
}

.pulse-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--ok);
  box-shadow: 0 0 0 0 var(--ok);
  animation: pulse 2s infinite;
  display: inline-block;
  flex-shrink: 0;
}
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(74,122,84,0.5); }
  70% { box-shadow: 0 0 0 6px transparent; }
  100% { box-shadow: 0 0 0 0 transparent; }
}

.live-pill {
  display: inline-flex; align-items: center; gap: 6px;
  height: 22px; padding: 0 10px;
  border-radius: 999px;
  background: var(--teal-soft); color: var(--teal);
  font-size: 11px; font-weight: 500;
  white-space: nowrap;
}

/* ---- Page ---- */
.page { padding: var(--page-pad); max-width: 1680px; width: 100%; }
.page-head {
  display: flex; align-items: flex-start; gap: 20px;
  margin-bottom: 26px;
  flex-wrap: wrap;
}
.page-eyebrow {
  color: var(--ink-3);
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  font-weight: 500;
  margin-bottom: 10px;
}
.page-title {
  font-family: var(--font-serif);
  font-size: 40px;
  font-weight: 400;
  letter-spacing: -0.02em;
  line-height: 1.05;
  color: var(--ink);
}
.page-title .amber { color: var(--accent); font-style: italic; }
.page-sub {
  color: var(--ink-3); font-size: 13.5px;
  margin-top: 10px;
  max-width: 720px;
}
.page-actions { margin-left: auto; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

/* ---- Buttons ---- */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  height: 34px; padding: 0 14px;
  border: 1px solid var(--rule);
  background: var(--card);
  border-radius: 9px;
  font-size: 13px;
  color: var(--ink);
  font-weight: 500;
  white-space: nowrap;
  transition: background .12s, border-color .12s, box-shadow .12s;
  font-family: var(--font-sans);
}
.btn:hover { background: var(--card-2); border-color: var(--ink-4); }
.btn svg { width: 14px; height: 14px; flex-shrink: 0; }
.btn.primary { background: var(--ok); color: #fff; border-color: var(--ok); }
.btn.primary:hover { background: #3d6445; border-color: #3d6445; }
.btn.accent { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
.btn.accent:hover { background: var(--accent-2); border-color: var(--accent-2); }
.btn.ghost { background: transparent; border-color: transparent; color: var(--ink-2); }
.btn.ghost:hover { background: var(--card); color: var(--ink); }
.btn.sm { height: 28px; padding: 0 10px; font-size: 11.5px; gap: 5px; border-radius: 7px; }
.btn.sm svg { width: 12px; height: 12px; }

/* ---- Chips ---- */
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11.5px; font-weight: 500;
  height: 22px; padding: 0 10px;
  border-radius: 999px;
  background: var(--card); color: var(--ink-2);
  white-space: nowrap;
  line-height: 1;
  border: 1px solid var(--rule);
}
.chip.ok   { background: var(--ok-soft);   color: var(--ok); border-color: transparent; }
.chip.warn { background: var(--warn-soft); color: var(--warn); border-color: transparent; }
.chip.bad  { background: var(--bad-soft);  color: var(--bad); border-color: transparent; }
.chip.info { background: var(--info-soft); color: var(--info); border-color: transparent; }
.chip.teal { background: var(--teal-soft); color: var(--teal); border-color: transparent; }
.chip.accent { background: var(--accent-soft); color: var(--accent); border-color: transparent; }
.chip .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.chip svg { width: 11px; height: 11px; }

.badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 600;
  height: 18px; padding: 0 7px;
  border-radius: 999px;
  text-transform: uppercase; letter-spacing: 0.05em;
  background: var(--bg-2); color: var(--ink-3);
}
.badge.badge-teal { background: var(--teal-soft); color: var(--teal); }
.badge.badge-amber { background: var(--accent-soft); color: var(--accent); }

/* ---- Card ---- */
.card {
  background: var(--card);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.card-head {
  padding: 16px 20px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--rule-2);
  min-height: 56px;
}
.card-title { font-weight: 500; font-size: 14.5px; letter-spacing: -0.01em; color: var(--ink); font-family: var(--font-serif); font-weight: 400; }
.card-sub { color: var(--ink-3); font-size: 12px; margin-top: 3px; font-weight: 400; }
.card-body { padding: 18px 20px; }
.card-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-wrap: nowrap; }

/* ---- KPI (Vidyalaya style — big serif number, pastel icon puck) ---- */
.kpi {
  padding: 20px;
  background: var(--card);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  min-width: 0;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  transition: border-color .12s, transform .12s;
  box-shadow: var(--shadow-sm);
}
.kpi:hover { border-color: var(--ink-4); }
.kpi-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 14px; }
.kpi-puck {
  width: 36px; height: 36px; border-radius: 50%;
  display: grid; place-items: center;
  flex-shrink: 0;
  margin-left: auto;
}
.kpi-puck.mint   { background: var(--mint);   color: var(--mint-ink); }
.kpi-puck.peach  { background: var(--peach);  color: var(--peach-ink); }
.kpi-puck.cream  { background: var(--cream);  color: var(--cream-ink); }
.kpi-puck.sky    { background: var(--sky);    color: var(--sky-ink); }
.kpi-puck.rose   { background: var(--rose);   color: var(--rose-ink); }
.kpi-puck.lilac  { background: var(--lilac);  color: var(--lilac-ink); }
.kpi .lbl {
  color: var(--ink-3);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  padding-top: 4px;
}
.kpi .val-row { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
.kpi .val {
  font-family: var(--font-serif);
  font-size: 34px;
  font-weight: 400;
  letter-spacing: -0.02em;
  color: var(--ink);
  line-height: 1;
  white-space: nowrap;
}
.kpi .val .unit { font-size: 16px; color: var(--ink-3); margin-left: 2px; font-weight: 400; }
.kpi .meta {
  display: flex; align-items: center; gap: 10px;
  margin-top: 10px;
  font-size: 11.5px;
  color: var(--ink-3);
  white-space: nowrap;
  overflow: hidden;
}
.kpi .meta > span { overflow: hidden; text-overflow: ellipsis; }
.kpi .spark { position: absolute; right: 14px; bottom: 14px; opacity: 0.7; pointer-events: none; }

.delta {
  display: inline-flex; align-items: center; gap: 2px;
  font-family: var(--font-mono);
  font-size: 11.5px; font-weight: 500;
  flex-shrink: 0;
}
.delta.up { color: var(--ok); }
.delta.down { color: var(--bad); }

/* ---- Dual progress (vidyalaya signature) ---- */
.dual-bar {
  display: flex;
  height: 6px;
  border-radius: 999px;
  overflow: hidden;
  background: var(--rule-2);
}
.dual-bar > span { display: block; height: 100%; }
.dual-bar .g { background: var(--ok); }
.dual-bar .r { background: var(--bad); }
.dual-bar .y { background: var(--warn); }

.metric-inline {
  display: inline-flex; flex-direction: column; gap: 4px;
  min-width: 88px;
}
.metric-inline .lbl { color: var(--ink-3); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; }
.metric-inline .val-row { display: flex; align-items: baseline; gap: 4px; }
.metric-inline .val { font-family: var(--font-mono); font-size: 13.5px; font-weight: 500; }

/* ---- Table ---- */
.table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.table th {
  text-align: left; color: var(--ink-3); font-weight: 500;
  font-size: 10.5px;
  padding: 11px 20px;
  border-bottom: 1px solid var(--rule);
  background: var(--card-2);
  text-transform: uppercase; letter-spacing: 0.08em;
  white-space: nowrap;
  height: 38px;
}
.table td {
  padding: 13px 20px;
  border-bottom: 1px solid var(--rule-2);
  vertical-align: middle;
}
.table tbody tr:hover { background: var(--card-2); }
.table tr:last-child td { border-bottom: 0; }
.table .num { font-family: var(--font-mono); text-align: right; font-variant-numeric: tabular-nums; }

/* ---- Progress ---- */
.bar { height: 5px; border-radius: 999px; background: var(--rule-2); overflow: hidden; position: relative; }
.bar > span { display: block; height: 100%; background: var(--accent); border-radius: 999px; }
.bar.thick { height: 7px; }
.bar.seg > span.ok { background: var(--ok); }
.bar.seg > span.warn { background: var(--warn); }
.bar.seg > span.bad { background: var(--bad); }

.sdot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; }
.sdot.ok { background: var(--ok); }
.sdot.warn { background: var(--warn); }
.sdot.bad { background: var(--bad); }
.sdot.neutral { background: var(--ink-4); }

<script type="text/babel">

// ═══════════════════════════════════════════════════════════════════════════════
//
//   VIDYALAYA360 · STANSFORD INTERNATIONAL HR.SEC.SCHOOL — STANDALONE DEMO

// ══════════════════════════════════════════════════════════════════════════════

//                                                                               
// ══════════════════════════════════════════════════════════════════════════════

const { useState, useEffect, useRef, useMemo, useCallback, useContext, Fragment, createContext } = React;


// ══════════════════════════════════════════════════════════════════════════════
//                                                                               
//   §2  localStorage-backed store                                               
//   The demo's persistence layer. Mirrors /api/X routes from the Next.js build. 
//                                                                               
// ══════════════════════════════════════════════════════════════════════════════


const STORE_KEY = "vidyalaya360.db";
const EMPTY_DB = {
  addedStudents: [], pendingFees: [], recentFees: [],
  complaints: [], enquiries: [], dailyLogs: [],
  routes: [], audit: [], activities: [],
};
const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
function readDb() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return { ...EMPTY_DB };
    const data = JSON.parse(raw);
    for (const k of Object.keys(EMPTY_DB)) if (!(k in data)) data[k] = EMPTY_DB[k];
    return data;
  } catch { return { ...EMPTY_DB }; }
}
function writeDb(data) { localStorage.setItem(STORE_KEY, JSON.stringify(data)); }
function newAuditId() { return "AUD-" + String(Math.floor(Math.random() * 1e6)).padStart(6, "0"); }
function whenLabel() { return new Date().toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" }); }
function termFeeFor(cls) { const n = Number(String(cls).split("-")[0]) || 1; return 14000 + n * 1000; }
function formatIndianPhone(raw) {
  if (!raw) return "—";
  let digits = String(raw).replace(/\D/g, "");
  if (digits.startsWith("91") && digits.length === 12) digits = digits.slice(2);
  else if (digits.startsWith("0") && digits.length === 11) digits = digits.slice(1);
  if (digits.length !== 10 || !/^[6-9]/.test(digits)) return null;
  return `+91 ${digits.slice(0, 5)} ${digits.slice(5)}`;
}
function logAudit(who, action, entity) {
  const db = readDb();
  db.audit.unshift({ id: newAuditId(), who, action, entity, when: whenLabel() });
  writeDb(db);
}

const store = {
  async readAllData() {
    await sleep(0);
    const db = readDb();
    return {
      KPIS: { students: { value: 0 }, collected: { value: 0 }, pending: { value: 0 }, balance: { value: 0 }, income: { value: 0 }, expense: { value: 0 } },
      CLASSES: [1,2,3,4,5,6,7,8].map(n => ({ n, label: `Class ${n}`, sections: ["A","B"], students: 0 })),
      CLASS_STRENGTH: [], INCOME_SERIES: [],
      ROLES: [
        { k: "super", label: "Super Admin", icon: "shield" },
        { k: "principal", label: "Principal", icon: "school" },
        { k: "teacher", label: "Teacher", icon: "book" },
        { k: "parent", label: "Parent", icon: "heart" },
      ],
      ADDED_STUDENTS: (db.addedStudents || []).filter(s => (s.status ?? "active") !== "archived"),
      ARCHIVED_STUDENTS: (db.addedStudents || []).filter(s => s.status === "archived"),
      PENDING_FEES: db.pendingFees || [],
      RECENT_FEES: db.recentFees || [],
      ACTIVITIES: db.activities || [],
      ROUTES: db.routes || [],
      COMPLAINTS: db.complaints || [],
      ENQUIRIES: db.enquiries || [],
      INVENTORY: [], STAFF: [], DONORS: [], AUTOMATIONS: [], SCHOOLS: [], USERS: [],
      AUDIT: db.audit || [],
      DAILY_LOGS: db.dailyLogs || [],
      ANOMALIES: [], DONATION_PIPELINE: [], COMPLIANCE: [], AI_BRIEF: [],
      TRUST_KPIS: { students: { value: "0" }, collected: { value: "0%" }, donations: { value: "₹0" }, teacherNPS: { value: "—" } },
    };
  },
  async addStudent(body) {
    if (!body || !body.name || !body.name.trim()) return { ok: false, error: "Name is required" };
    let parent = "—";
    if (body.parent && String(body.parent).trim() && String(body.parent).trim() !== "—") {
      const f = formatIndianPhone(body.parent);
      if (f === null) return { ok: false, error: "Parent phone must be a 10-digit Indian mobile starting with 6, 7, 8 or 9" };
      parent = f;
    }
    const cls = Number(body.cls) || 1;
    const section = (body.section || "A").toUpperCase();
    const id = "STN-" + String(9000 + Math.floor(Math.random() * 999)).padStart(4, "0");
    const row = {
      id, name: body.name.trim(), cls: `${cls}-${section}`, parent,
      fee: "pending", attendance: 0, transport: body.transport || "—",
      joined: new Date().toLocaleDateString("en-IN", { month: "short", year: "numeric" }),
      status: "active",
    };
    const db = readDb();
    db.addedStudents.unshift(row);
    db.pendingFees.unshift({ id, name: row.name, cls: row.cls, amount: termFeeFor(row.cls), due: "in 7 days", overdue: false });
    writeDb(db);
    logAudit("Rashmi Iyer", "New admission", `${id} ${row.name}`);
    return { ok: true, student: row };
  },
  async archiveStudent(id) {
    const db = readDb();
    const idx = db.addedStudents.findIndex(s => s.id === id);
    if (idx === -1) return { ok: false, error: "Not found" };
    db.addedStudents[idx] = { ...db.addedStudents[idx], status: "archived", archivedAt: new Date().toISOString() };
    db.pendingFees = db.pendingFees.filter(f => f.id !== id);
    writeDb(db);
    logAudit("Rashmi Iyer", "Archived student", `${id} ${db.addedStudents[idx].name} · history kept`);
    return { ok: true, student: db.addedStudents[idx] };
  },
  async restoreStudent(id) {
    const db = readDb();
    const idx = db.addedStudents.findIndex(s => s.id === id);
    if (idx === -1) return { ok: false, error: "Not found" };
    db.addedStudents[idx] = { ...db.addedStudents[idx], status: "active", archivedAt: null };
    const s = db.addedStudents[idx];
    if (!db.pendingFees.find(f => f.id === id)) {
      db.pendingFees.unshift({ id, name: s.name, cls: s.cls, amount: termFeeFor(s.cls), due: "in 7 days", overdue: false });
    }
    writeDb(db);
    logAudit("Rashmi Iyer", "Restored student", `${id} ${s.name}`);
    return { ok: true, student: s };
  },
  async importStudents(csv) {
    if (typeof csv !== "string" || !csv.trim()) return { ok: false, error: "csv body required" };
    const rows = [];
    let i = 0, cell = "", row = [], inQ = false;
    while (i < csv.length) {
      const c = csv[i];
      if (inQ) { if (c === '"') { if (csv[i+1] === '"') { cell += '"'; i += 2; continue; } inQ = false; i++; continue; } cell += c; i++; continue; }
      if (c === '"') { inQ = true; i++; continue; }
      if (c === ",") { row.push(cell); cell = ""; i++; continue; }
      if (c === "\n" || c === "\r") { if (cell.length || row.length) { row.push(cell); rows.push(row); row = []; cell = ""; } if (c === "\r" && csv[i+1] === "\n") i++; i++; continue; }
      cell += c; i++;
    }
    if (cell.length || row.length) { row.push(cell); rows.push(row); }
    const cleaned = rows.filter(r => r.length && r.some(c => c.trim()));
    if (cleaned.length < 2) return { ok: false, error: "Need at least one header row and one data row" };
    const header = cleaned[0].map(h => h.toLowerCase().trim());
    const idx = (k) => header.findIndex(h => h.includes(k));
    const ni = idx("name"), ci = idx("class"), pi = idx("parent"), ti = idx("transport");
    if (ni === -1) return { ok: false, error: "CSV needs a Name column" };
    const db = readDb();
    let count = 0;
    for (const cells of cleaned.slice(1)) {
      const name = (cells[ni] || "").trim();
      if (!name) continue;
      const clsRaw = (cells[ci] || "1-A").trim();
      const cls = /^\d/.test(clsRaw) ? (clsRaw.includes("-") ? clsRaw : `${clsRaw}-A`) : "1-A";
      const id = "STN-" + String(9000 + Math.floor(Math.random() * 999)).padStart(4, "0");
      const row = { id, name, cls, parent: (cells[pi] || "—").trim(), fee: "pending", attendance: 0, transport: (cells[ti] || "—").trim(), joined: new Date().toLocaleDateString("en-IN", { month: "short", year: "numeric" }), status: "active" };
      db.addedStudents.unshift(row);
      db.pendingFees.unshift({ id, name, cls, amount: termFeeFor(cls), due: "in 7 days", overdue: false });
      count++;
    }
    writeDb(db);
    logAudit("Rashmi Iyer", "Bulk import", `${count} students added`);
    return { ok: true, count };
  },
  async payFee(id, method = "UPI") {
    const db = readDb();
    const idx = db.pendingFees.findIndex(f => f.id === id);
    if (idx === -1) return { ok: false, error: "Not found" };
    const fee = db.pendingFees[idx];
    db.pendingFees.splice(idx, 1);
    const paid = { id: fee.id, name: fee.name, cls: fee.cls, amount: fee.amount, method, time: "just now", status: "paid" };
    db.recentFees.unshift(paid);
    const sIdx = db.addedStudents.findIndex(s => s.id === id);
    if (sIdx !== -1) db.addedStudents[sIdx].fee = "paid";
    db.activities.unshift({ t: "fee", tone: "accent", title: `Fee received · ${fee.id} ${fee.name}`, sub: `${method} · ₹${fee.amount.toLocaleString("en-IN")} · receipt auto-sent`, ts: "now" });
    writeDb(db);
    logAudit("Rashmi Iyer", "Marked fee paid", `${fee.id} ${fee.name}`);
    return { ok: true, fee: paid };
  },
  async remindFees(ids, channel = "WhatsApp") {
    const db = readDb();
    const matched = db.pendingFees.filter(f => ids.includes(f.id));
    if (matched.length === 0) return { ok: false, error: "No matching fees" };
    db.activities.unshift({ t: "automation", tone: "accent", title: `Fee reminder fired · ${matched.length} families`, sub: `${channel} sent · ${matched.map(m => m.name).slice(0,3).join(", ")}${matched.length > 3 ? "…" : ""}`, ts: "now" });
    writeDb(db);
    for (const f of matched) logAudit("Rashmi Iyer", `Reminder · ${channel}`, `${f.id} ${f.name}`);
    return { ok: true, count: matched.length };
  },
  async patchComplaint(id, status) {
    const db = readDb();
    const idx = db.complaints.findIndex(c => c.id === id);
    if (idx === -1) return { ok: false, error: "Not found" };
    db.complaints[idx] = { ...db.complaints[idx], status };
    writeDb(db);
    logAudit("Rashmi Iyer", `Complaint → ${status}`, `${id} ${db.complaints[idx].student}`);
    return { ok: true, complaint: db.complaints[idx] };
  },
  async patchEnquiry(id, status) {
    const db = readDb();
    const idx = db.enquiries.findIndex(e => e.id === id);
    if (idx === -1) return { ok: false, error: "Not found" };
    db.enquiries[idx] = { ...db.enquiries[idx], status };
    writeDb(db);
    logAudit("Rashmi Iyer", `Enquiry → ${status}`, `${id} ${db.enquiries[idx].name}`);
    return { ok: true, enquiry: db.enquiries[idx] };
  },
  async setStopBoarding(code, stopName, action) {
    const db = readDb();
    const route = db.routes.find(r => r.code === code);
    if (!route) return { ok: false, error: "Route or stop not found" };
    const stop = route.stops.find(s => s.name === stopName);
    if (!stop) return { ok: false, error: "Stop not found" };
    if (action === "board" && stop.boarded + stop.absent < stop.cap) stop.boarded += 1;
    else if (action === "absent") {
      if (stop.boarded + stop.absent < stop.cap) stop.absent += 1;
      else if (stop.boarded > 0) { stop.boarded -= 1; stop.absent += 1; }
    }
    writeDb(db);
    logAudit(`${route.driver} (driver)`, `Marked ${action}`, `${code} · ${stopName}`);
    return { ok: true, route };
  },
  async upsertDailyLog(body) {
    if (!body.studentId || !body.date) return { ok: false, error: "studentId and date are required" };
    const db = readDb();
    if (!Array.isArray(db.dailyLogs)) db.dailyLogs = [];
    const row = {
      studentId: body.studentId, studentName: body.studentName || "", cls: body.cls || "",
      date: body.date,
      classwork: (body.classwork || "").trim(), homework: (body.homework || "").trim(),
      topics: (body.topics || "").trim(),
      handwritingNote: (body.handwritingNote || "").trim(),
      handwritingGrade: (body.handwritingGrade || "").trim(),
      behaviour: (body.behaviour || "").trim(), extra: (body.extra || "").trim(),
      postedBy: body.postedBy || "Teacher", postedAt: new Date().toISOString(),
    };
    const idx = db.dailyLogs.findIndex(l => l.studentId === row.studentId && l.date === row.date);
    const fresh = idx === -1;
    if (fresh) db.dailyLogs.unshift(row); else db.dailyLogs[idx] = row;
    writeDb(db);
    logAudit(row.postedBy, fresh ? "Posted daily log" : "Updated daily log", `${row.studentId} ${row.studentName} · ${row.date}`);
    return { ok: true, log: row };
  },
};

const money = (n) => "₹" + Number(n).toLocaleString("en-IN");
const moneyK = (n) => {
  if (n >= 10000000) return "₹" + (n/10000000).toFixed(2) + "Cr";
  if (n >= 100000)   return "₹" + (n/100000).toFixed(2) + "L";
  if (n >= 1000)     return "₹" + (n/1000).toFixed(1) + "K";
  return "₹" + n;
};

const KPI = ({ label, value, unit, delta, deltaDir, sub, sparkData, puck, puckIcon }) => {
  const arrow = deltaDir === "up" ? "arrowUp" : deltaDir === "down" ? "arrowDown" : null;
  return (
    <div className="kpi">
      <div className="kpi-top">
        <div className="lbl">{label}</div>
        {puck && (
          <div className={`kpi-puck ${puck}`}>
            <Icon name={puckIcon || "spark"} size={16} />
          </div>
        )}
      </div>
      <div className="val-row">
        <div className="val">
          {value}
          {unit ? <span className="unit">{unit}</span> : null}
        </div>
        {delta && (
          <span className={`delta ${deltaDir}`}>
            {arrow && <Icon name={arrow} size={10} stroke={2.2} />}
            {delta}
          </span>
        )}
      </div>
      <div className="meta">{sub && <span>{sub}</span>}</div>
      {sparkData && <Sparkline data={sparkData} w={80} h={24} className="spark" />}
    </div>
  );
};

const Sparkline = ({ data, w = 100, h = 28, stroke = "var(--accent-2)", fill = "var(--accent-soft)", className }) => {
  const max = Math.max(...data);
  const min = Math.min(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * (w - 2) + 1;
    const y = h - 1 - ((v - min) / range) * (h - 2);
    return [x, y];
  });
  const d = "M " + pts.map((p) => p.join(",")).join(" L ");
  const area = d + ` L ${w - 1},${h - 1} L 1,${h - 1} Z`;
  return (
    <svg className={className} width={w} height={h}>
      <path d={area} fill={fill} opacity="0.6" />
      <path d={d} fill="none" stroke={stroke} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
};

const ChartEmpty = ({ h }) => (
  <div style={{ height: h || 200, display: "grid", placeItems: "center", color: "var(--ink-4)", fontSize: 12.5 }}>
    No data yet
  </div>
);

const LineBarChart = ({ data, w, h, lineKeys = ["inc"], barKey, xKey = "w", palette }) => {
  if (!data || data.length === 0) return <ChartEmpty h={h} />;
  const pad = { t: 16, r: 16, b: 22, l: 36 };
  const iw = w - pad.l - pad.r;
  const ih = h - pad.t - pad.b;
  const vals = data.flatMap((d) => [...lineKeys.map((k) => d[k]), barKey ? d[barKey] : 0]);
  const max = Math.ceil(Math.max(...vals) / 10) * 10;
  const bw = (iw / data.length) * 0.5;
  const xAt = (i) => pad.l + (i + 0.5) * (iw / data.length);
  const yAt = (v) => pad.t + ih - (v / max) * ih;
  const ticks = [0, max / 2, max];
  return (
    <svg width={w} height={h} className="chartbox" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{ width: "100%", height: h }}>
      {ticks.map((t, i) => (
        <g key={i}>
          <line x1={pad.l} x2={pad.l + iw} y1={yAt(t)} y2={yAt(t)} stroke="var(--rule)" strokeDasharray="2 3" />
          <text x={pad.l - 6} y={yAt(t) + 3} textAnchor="end" fontSize="10" fill="var(--ink-4)" fontFamily="var(--font-mono)">
            {t}
          </text>
        </g>
      ))}
      {barKey && data.map((d, i) => (
        <rect key={i} x={xAt(i) - bw / 2} y={yAt(d[barKey])} width={bw} height={ih - (yAt(d[barKey]) - pad.t)} rx="2" fill="var(--rule-2)" />
      ))}
      {lineKeys.map((k, ki) => {
        const color = palette?.[ki] || "var(--accent-2)";
        const pts = data.map((d, i) => [xAt(i), yAt(d[k])]);
        const path = "M " + pts.map((p) => p.join(",")).join(" L ");
        const area = path + ` L ${xAt(data.length - 1)},${pad.t + ih} L ${xAt(0)},${pad.t + ih} Z`;
        return (
          <g key={k}>
            {ki === 0 && <path d={area} fill={color} opacity="0.08" />}
            <path d={path} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
            {pts.map(([x, y], i) => (
              <circle key={i} cx={x} cy={y} r="2.5" fill="var(--card)" stroke={color} strokeWidth="1.5" />
            ))}
          </g>
        );
      })}
      {data.map((d, i) => (
        <text key={i} x={xAt(i)} y={h - 6} textAnchor="middle" fontSize="10" fill="var(--ink-4)" fontFamily="var(--font-mono)">
          {d[xKey]}
        </text>
      ))}
    </svg>
  );
};

const BarChart = ({ data, w, h, xKey, yKey, yKey2, labelFmt, palette = ["var(--accent)", "var(--rule-2)"] }) => {
  if (!data || data.length === 0) return <ChartEmpty h={h} />;
  const pad = { t: 12, r: 8, b: 28, l: 8 };
  const iw = w - pad.l - pad.r;
  const ih = h - pad.t - pad.b;
  const max = Math.max(...data.map((d) => d[yKey]));
  const bw = (iw / data.length) * 0.62;
  const xAt = (i) => pad.l + (i + 0.5) * (iw / data.length);
  const yAt = (v) => pad.t + ih - (v / max) * ih;
  return (
    <svg width={w} height={h} className="chartbox" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{ width: "100%", height: h }}>
      {data.map((d, i) => {
        const y1 = yAt(d[yKey]);
        const y2 = yKey2 ? yAt(d[yKey] + d[yKey2]) : y1;
        return (
          <g key={i}>
            {yKey2 && <rect x={xAt(i) - bw / 2} y={y2} width={bw} height={y1 - y2} fill={palette[1]} rx="2" />}
            <rect x={xAt(i) - bw / 2} y={y1} width={bw} height={pad.t + ih - y1} fill={palette[0]} rx="2" />
            <text x={xAt(i)} y={h - 12} textAnchor="middle" fontSize="10" fill="var(--ink-3)" fontFamily="var(--font-mono)">
              {d[xKey]}
            </text>
            <text x={xAt(i)} y={h - 2} textAnchor="middle" fontSize="9.5" fill="var(--ink-4)" fontFamily="var(--font-mono)">
              {labelFmt ? labelFmt(d) : d[yKey]}
            </text>
          </g>
        );
      })}
    </svg>
  );
};

const Ring = ({ pct, size = 72, stroke = 8, color = "var(--accent)", track = "var(--rule-2)", label, sub }) => {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const dash = (pct / 100) * c;
  return (
    <div className="ring" style={{ width: size, height: size, position: "relative" }}>
      <svg width={size} height={size}>
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={track} strokeWidth={stroke} />
        <circle
          cx={size / 2}
          cy={size / 2}
          r={r}
          fill="none"
          stroke={color}
          strokeWidth={stroke}
          strokeDasharray={`${dash} ${c}`}
          strokeLinecap="round"
          transform={`rotate(-90 ${size / 2} ${size / 2})`}

const FakeQR = ({ size = 156, seed = 7 }) => {
  const n = 21;
  const cells = [];
  let s = seed;
  const next = () => {
    s = (s * 9301 + 49297) % 233280;
    return s / 233280;
  };
  for (let y = 0; y < n; y++) {
    for (let x = 0; x < n; x++) {
      if (next() > 0.52) cells.push([x, y]);
    }
  }
  const finder = (fx, fy) => [
    <rect key={`f1-${fx}-${fy}`} x={fx} y={fy} width="7" height="7" fill="currentColor" />,
    <rect key={`f2-${fx}-${fy}`} x={fx + 1} y={fy + 1} width="5" height="5" fill="var(--card)" />,
    <rect key={`f3-${fx}-${fy}`} x={fx + 2} y={fy + 2} width="3" height="3" fill="currentColor" />,
  ];
  return (
    <svg viewBox={`0 0 ${n} ${n}`} width={size} height={size} style={{ color: "var(--ink)", display: "block" }}>
      <rect width={n} height={n} fill="var(--card)" />
      {cells
        .filter(([x, y]) => !(x < 8 && y < 8) && !(x > n - 9 && y < 8) && !(x < 8 && y > n - 9))
        .map(([x, y], i) => (
          <rect key={i} x={x} y={y} width="1" height="1" fill="currentColor" />
        ))}
      {finder(0, 0)}
      {finder(n - 7, 0)}
      {finder(0, n - 7)}
    </svg>
  );
};

;(function(){

// Build the last 8 week-start dates relative to today. Computed lazily on
// the client (see useEffect in the component) so server- and client-rendered
// markup match — otherwise we'd hit a hydration mismatch when the server
// clock crosses a day boundary vs the user's clock.
function buildWeeks() {
  const out = [];
  const today = new Date();
  const day = today.getDay() || 7;
  const monday = new Date(today);
  monday.setDate(today.getDate() - (day - 1));
  for (let i = 0; i < 8; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() - i * 7);
    const iso = d.toISOString().slice(0, 10);
    const short = d.toLocaleDateString("en-IN", { day: "numeric", month: "short" });
    out.push({ iso, label: `Week of ${short}`, short });
  }
  return out;
}

// Stable placeholders rendered on first paint so SSR matches CSR.
const PLACEHOLDER_WEEKS = Array.from({ length: 8 }, (_, i) => ({
  iso: `placeholder-${i}`,
  label: i === 0 ? "Current week" : `Week -${i}`,
  short: i === 0 ? "current" : `-${i}w`,
}));

const EMPTY_LOG = {
  classwork: "",
  homework: "",
  topics: "",
  handwritingNote: "",
  handwritingGrade: "",
  behaviour: "",
  extra: "",
};

function ScreenAcademic({ E, refresh, role }) {
  const classes = E.CLASSES;
  const [cls, setCls] = useState(5);
  const [sec, setSec] = useState("A");
  const [selectedStudent, setSelectedStudent] = useState(0);

  // Parent view: pin the class/section to the parent's child and skip the
  // class picker altogether. This runs whenever the parent's child (or role)
  // changes so switching roles redirects correctly.
  useEffect(() => {
    if (role === "parent" && E.ADDED_STUDENTS && E.ADDED_STUDENTS[0]) {
      const child = E.ADDED_STUDENTS[0];
      const [c, s] = String(child.cls).split("-");
      const n = Number(c);
      if (!Number.isNaN(n)) setCls(n);
      if (s) setSec(s);
    }
  }, [role, E.ADDED_STUDENTS]);
  // WEEKS + TODAY_ISO depend on the client clock; populate after mount.
  const [WEEKS, setWeeks] = useState(PLACEHOLDER_WEEKS);
  const [TODAY_ISO, setTodayIso] = useState("");
  const [weekIso, setWeekIso] = useState(PLACEHOLDER_WEEKS[0].iso);
  useEffect(() => {
    const fresh = buildWeeks();
    setWeeks(fresh);
    setTodayIso(new Date().toISOString().slice(0, 10));
    setWeekIso((prev) => (prev.startsWith("placeholder-") ? fresh[0].iso : prev));
  }, []);
  const [weekOpen, setWeekOpen] = useState(false);
  const [showLog, setShowLog] = useState(false);
  const [toast, setToast] = useState(null);
  const toastTimer = useRef(null);
  const flash = (msg, tone = "ok") => {
    setToast({ msg, tone });
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 2400);
  };

  const week = WEEKS.find((w) => w.iso === weekIso) || WEEKS[0];

  // Roster is built from real students in the DB filtered by class and section.
  const roster = useMemo(() => {
    const want = `${cls}-${sec}`;
    return (E.ADDED_STUDENTS || [])
      .filter((s) => s.cls === want)
      .map((s, i) => ({
        id: s.id,
        name: s.name,
        roll: i + 1,
        attendance: s.attendance ?? 0,
        homework: 0,
        classwork: 0,
        handwriting: "—",
        behavior: "—",
      }));
  }, [E.ADDED_STUDENTS, cls, sec]);

  // Reset selection if the previously-selected index is out of range
  useEffect(() => {
    if (selectedStudent >= roster.length) setSelectedStudent(0);
  }, [roster.length]); // eslint-disable-line react-hooks/exhaustive-deps

  const student = roster[selectedStudent] || null;

  const heatmap = student
    ? Array.from({ length: 28 }, (_, i) => {
        const seed = student.id.charCodeAt(student.id.length - 1) * (i + 1);
        const v = ((seed * 9301 + 49297) % 233280) / 233280;
        if (i % 7 === 6) return { v: -1 };
        if (v < 0.08) return { v: 0 };
        return { v: Math.min(4, Math.floor(v * 5)) };
      })
    : [];

  // Saved daily log for this student today, if any.
  const savedLog = student
    ? (E.DAILY_LOGS || []).find((l) => l.studentId === student.id && l.date === TODAY_ISO)
    : null;
  const logToShow = savedLog || { ...EMPTY_LOG, postedBy: "", postedAt: null };
  const isUserSaved = Boolean(savedLog);

  // ---------- Handlers ----------
  const submitLog = async (form) => {
    if (!student) {
      flash("No student selected", "bad");
      return;
    }
    const r = ({ ok: true, json: await store.upsertDailyLog({ ...form, studentId: student.id, studentName: student.name, cls: `${cls}-${sec}`, date: TODAY_ISO, postedBy: "Teacher" }) });
    
    if (json.ok) {
      flash(`Daily log posted for ${student.name}`);
      await refresh?.();
      setShowLog(false);
    } else {
      flash(json.error || "Could not save log", "bad");
    }
  };

  const downloadMonthlyReport = () => {
    const monthName = "April 2026";
    const header = "Class,Roll,Student ID,Name,Attendance %,Homework %,Classwork %,Handwriting,Behaviour,Has Daily Log";
    const lines = [header];
    roster.forEach((s) => {
      const has = (E.DAILY_LOGS || []).some((l) => l.studentId === s.id);
      lines.push(
        `${cls}-${sec},${s.roll},${s.id},"${s.name}",${s.attendance},${s.homework},${s.classwork},${s.handwriting},${s.behavior},${has ? "Yes" : "No"}`
      );
    });
    // Class-level summary at the bottom
    lines.push("");
    lines.push(`Summary,Class ${cls}-${sec},${monthName}`);
    lines.push(`Avg attendance,${Math.round(roster.reduce((a, r) => a + r.attendance, 0) / roster.length)}%`);
    lines.push(`Avg homework,${Math.round(roster.reduce((a, r) => a + r.homework, 0) / roster.length)}%`);

    lines.push(`Logs posted,${(E.DAILY_LOGS || []).filter((l) => l.cls === `${cls}-${sec}`).length}`);

    const csv = lines.join("\n");
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });

    const a = document.createElement("a");

    <div className="week-menu" style={{

}

function LogModal({ student, cls, existing, onClose, onSubmit }) {
  const [form, setForm] = useState({
    classwork: existing?.classwork || "",
    homework: existing?.homework || "",
    topics: existing?.topics || "",
    handwritingNote: existing?.handwritingNote || "",
    handwritingGrade: existing?.handwritingGrade || "A",
    behaviour: existing?.behaviour || "",
    extra: existing?.extra || "",
  });
  const [busy, setBusy] = useState(false);
  const set = (k, v) => setForm((f) => ({ ...f, [k]: v }));

  useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    document.addEventListener("keydown", onKey);
    return () => document.removeEventListener("keydown", onKey);
  }, [onClose]);

  const submit = async (e) => {
    e.preventDefault();
    setBusy(true);
    await onSubmit(form);
    setBusy(false);
  };

  return (
    <div onClick={onClose} style={{
      position: "fixed", inset: 0, background: "rgba(20,16,10,0.45)",
      display: "grid", placeItems: "center", zIndex: 250, padding: 16, overflowY: "auto",
    }}>
      <div onClick={(e) => e.stopPropagation()} className="card" style={{ width: "100%", maxWidth: 560, maxHeight: "calc(100vh - 32px)", overflowY: "auto" }}>
        <div className="card-head">
          <div>
            <div className="card-title">{existing ? "Edit today's log" : "Log today"}</div>
            <div className="card-sub">{student?.name || "—"} · {student?.id || ""} · Class {cls} · {TODAY_ISO}</div>
          </div>
          <button className="icon-btn" onClick={onClose}><Icon name="x" size={14} /></button>
        </div>
        <form onSubmit={submit} className="card-body" style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <Field label="Classwork">
            <input className="input" value={form.classwork} onChange={(e) => set("classwork", e.target.value)} placeholder="e.g. Fractions · Ex 3.2 pp. 54–56" />
          </Field>
          <Field label="Homework">
            <input className="input" value={form.homework} onChange={(e) => set("homework", e.target.value)} placeholder="What's due tomorrow" />
          </Field>
          <Field label="Topics covered today">
            <input className="input" value={form.topics} onChange={(e) => set("topics", e.target.value)} placeholder="Brief subject-wise summary" />
          </Field>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 110px", gap: 10 }}>
            <Field label="Handwriting note">
              <input className="input" value={form.handwritingNote} onChange={(e) => set("handwritingNote", e.target.value)} />
            </Field>
            <Field label="Grade">
              <select className="select" value={form.handwritingGrade} onChange={(e) => set("handwritingGrade", e.target.value)}>
                {["A+", "A", "A-", "B+", "B", "B-", "C", "D"].map((g) => <option key={g} value={g}>{g}</option>)}
              </select>
            </Field>
          </div>
          <Field label="Behaviour">
            <input className="input" value={form.behaviour} onChange={(e) => set("behaviour", e.target.value)} placeholder="One sentence on how the day went" />
          </Field>
          <Field label="Extra-curricular">
            <input className="input" value={form.extra} onChange={(e) => set("extra", e.target.value)} placeholder="Clubs, sports, art, etc." />
          </Field>

          <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 4 }}>
            <button type="button" className="btn ghost" onClick={onClose}>Cancel</button>
            <button type="submit" className="btn accent" disabled={busy}>
              <Icon name="check" size={13} />{busy ? "Posting…" : existing ? "Save changes" : "Post log"}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

function Field({ label, children }) {

    <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
      <span style={{ fontSize: 11, color: "var(--ink-3)", textTransform: "uppercase", letterSpacing: "0.06em", fontWeight: 500 }}>{label}</span>
      {children}
    </div>
  );
}

function toneFor(action = "") {
  const a = action.toLowerCase();
  if (a.includes("paid") || a.includes("receipt") || a.includes("board")) return "ok";
  if (a.includes("resolved") || a.includes("converted")) return "ok";
  if (a.includes("absent") || a.includes("complaint")) return "bad";
  if (a.includes("progress") || a.includes("contacted") || a.includes("late")) return "warn";
  if (a.includes("created") || a.includes("enquiry") || a.includes("viewed")) return "info";
  return "accent";
}

        <KPI label="Failed attempts" value={0} sub="locked after 5" puck="rose" puckIcon="warning" />

              <span className={`chip ${e.tone}`}><span className="dot" />{e.tone}</span>

//   §17  Fees screen

// ══════════════════════════════════════════════════════════════════════════════

;(function(){

const DEMO_PARENT_PHONE = "+919876543210";

function ScreenFees({ E, refresh, role }) {
  const isParent = role === "parent";
  // ---------- core state ----------
  // Parent-aware initial selection: pick the first PENDING (or the first
  // PAID) for the currently-logged-in child, not whichever happens to be
  // top of the global list.
  const [selected, setSelected] = useState(() => {
    const childId = role === "parent" && E.ADDED_STUDENTS && E.ADDED_STUDENTS[0]
      ? E.ADDED_STUDENTS[0].id : null;
    const p = childId ? (E.PENDING_FEES || []).filter((f) => f.id === childId) : (E.PENDING_FEES || []);
    const r = childId ? (E.RECENT_FEES  || []).filter((f) => f.id === childId) : (E.RECENT_FEES  || []);
    return p[0] || r[0];
  });
  const [stage, setStage] = useState("pick");
  const [method, setMethod] = useState("UPI");
  const [busy, setBusy] = useState(false);

  // ---------- filters / selection ----------
  const [statusFilter, setStatusFilter] = useState("All");
  const [classFilter, setClassFilter] = useState("All");
  const [filterOpen, setFilterOpen] = useState(false);
  const [collectOpen, setCollectOpen] = useState(false);
  const [picked, setPicked] = useState(new Set());

  // ---------- toast ----------
  const [toast, setToast] = useState(null);
  const toastTimer = useRef(null);
  const flash = (msg, tone = "ok") => {
    setToast({ msg, tone });
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 2400);
  };

  // ---------- parent-scoped fee lists ----------
  // Defence-in-depth: even if AppShell's parent-scoping was applied upstream,
  // we also scope here, so the Fees screen *always* respects "only my child"
  // when viewed as a parent. Non-parent roles see every row as before.
  const myChildId = isParent && E.ADDED_STUDENTS && E.ADDED_STUDENTS[0]
    ? E.ADDED_STUDENTS[0].id : null;
  const scopedPending = useMemo(
    () => (myChildId ? (E.PENDING_FEES || []).filter((f) => f.id === myChildId) : (E.PENDING_FEES || [])),
    [E.PENDING_FEES, myChildId]
  );
  const scopedRecent = useMemo(
    () => (myChildId ? (E.RECENT_FEES || []).filter((f) => f.id === myChildId) : (E.RECENT_FEES || [])),
    [E.RECENT_FEES, myChildId]
  );

  // ---------- derived data ----------
  const all = useMemo(
    () => [
      ...scopedRecent.map((f) => ({ ...f, status: "paid" })),
      ...scopedPending.map((f) => ({ ...f, status: f.overdue ? "overdue" : "pending", method: "—", time: "due " + f.due })),
    ],
    [scopedRecent, scopedPending]
  );

  const counts = {
    All: all.length,
    Paid: all.filter((f) => f.status === "paid").length,
    Pending: all.filter((f) => f.status === "pending").length,
    Overdue: all.filter((f) => f.status === "overdue").length,
  };

  const visible = all.filter((f) => {
    if (statusFilter === "Paid" && f.status !== "paid") return false;
    if (statusFilter === "Pending" && f.status !== "pending") return false;
    if (statusFilter === "Overdue" && f.status !== "overdue") return false;
    if (classFilter !== "All" && f.cls.split("-")[0] !== classFilter.replace("Class ", "")) return false;
    return true;
  });

  const totals = {
    collected: scopedRecent.reduce((a, f) => a + f.amount, 0),
    pending: scopedPending.reduce((a, f) => a + f.amount, 0),
    overdue: scopedPending.filter((f) => f.overdue).reduce((a, f) => a + f.amount, 0),
  };

  // After data refresh, if `selected` is paid and we're in "pick", advance to next pending
  useEffect(() => {
    if (stage !== "pick" || !selected) return;
    const stillPending = scopedPending.find((f) => f.id === selected.id);
    if (!stillPending) {
      const next = scopedPending[0];
      if (next) setSelected(next);
    }
  }, [scopedPending, stage]); // eslint-disable-line react-hooks/exhaustive-deps

  // Drop bulk selections that no longer exist
  useEffect(() => {
    setPicked((prev) => {
      const valid = new Set(all.map((f) => f.id));
      let changed = false;
      const next = new Set();
      prev.forEach((id) => {
        if (valid.has(id)) next.add(id);
        else changed = true;
      });
      return changed ? next : prev;
    });
  }, [all]);

  // ---------- handlers ----------
  const proceed = () => setStage("qr");

  const markPaid = async () => {
    if (!selected) return;
    if (selected.status === "paid") {
      setStage("paid");
      return;
    }
    setBusy(true);
    try {
      const r = ({ ok: true, json: await store.payFee(selected.id, method) });
      
      if (!json.ok) {
        flash("Could not post payment", "bad");
        setBusy(false);
        return;
      }
      await refresh?.();
      flash("Payment posted · receipt auto-sent", "ok");
    } finally {
      setBusy(false);
      setStage("paid");
    }
  };

  const reset = () => setStage("pick");

  const openReceipt = (fee) => {
    setSelected(fee);
    setStage("paid");
    flash(`Receipt loaded · ${fee.id}`);
  };

  const headerCollect = () => {
    if (scopedPending.length === 0) {
      flash("No pending fees right now", "ok");
      return;
    }
    setCollectOpen((v) => !v);
  };
  const pickFromCollect = (fee) => {
    setSelected(fee);
    setStage("pick");
    setCollectOpen(false);
    flash(`Loaded ${fee.name} · choose method and proceed`);
  };

  const togglePick = (id) =>
    setPicked((prev) => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id);
      else next.add(id);
      return next;
    });

  const eligibleForRemind = visible.filter((f) => f.status !== "paid").map((f) => f.id);
  const allChecked = eligibleForRemind.length > 0 && eligibleForRemind.every((id) => picked.has(id));
  const togglePickAll = () => {
    if (allChecked) setPicked(new Set());
    else setPicked(new Set(eligibleForRemind));
  };

  const remindSelected = async (channel = "WhatsApp") => {
    if (picked.size === 0) {
      flash("Pick at least one row first", "bad");
      return;
    }
    const ids = [...picked];
    const r = ({ ok: true, json: await store.remindFees(ids, channel) });
    
    if (json.ok) {
      flash(`${json.count} ${channel} reminders queued`);
      setPicked(new Set());
      await refresh?.();
    } else {
      flash("Reminder failed", "bad");
    }
  };

  const exportCsv = () => {
    const header = "ID,Name,Class,Amount,Status,Method,When";
    const rows = all.map(
      (f) => `${f.id},"${f.name}",${f.cls},${f.amount},${f.status},${f.method || ""},${f.time || ""}`
    );
    const csv = [header, ...rows].join("\n");
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `fees-${new Date().toISOString().slice(0, 10)}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    flash(`Exported ${all.length} rows to CSV`);
  };

  const importStructure = () => {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = ".csv,.xlsx,.xls";
    input.onchange = (e) => {
      const f = e.target.files?.[0];
      if (!f) return;
      flash(`Imported "${f.name}" · ${(f.size / 1024).toFixed(1)} KB`);
    };
    input.click();
  };

  // Receipt actions
  const phoneFor = () => DEMO_PARENT_PHONE.replace(/[^0-9]/g, "");
  const sendWhatsApp = () => {
    const text = encodeURIComponent(`Receipt for ${selected.name} (${selected.id}) · ₹${selected.amount} paid via ${method}. Thank you — Stansford International HR.Sec.School.`);
    window.open(`https://wa.me/${phoneFor()}?text=${text}`, "_blank");
    flash("Opened WhatsApp");
  };
  const sendSms = () => {
    window.open(`sms:${DEMO_PARENT_PHONE}?body=Receipt%20${selected.id}%20%E2%82%B9${selected.amount}%20paid`, "_self");
    flash("Opened SMS app");
  };
  const sendEmail = () => {
    const subject = encodeURIComponent(`Fee receipt · ${selected.id} · ${selected.name}`);
    const body = encodeURIComponent(`Dear Parent,\n\nThis is to confirm receipt of ₹${selected.amount} towards fees for ${selected.name} (Class ${selected.cls}, Reg ID ${selected.id}).\nMethod: ${method}\n\nThank you,\nStansford International HR.Sec.School`);
    window.open(`mailto:parent@example.com?subject=${subject}&body=${body}`, "_self");
    flash("Opened email draft");
  };
  const printReceipt = () => {
    window.print();
    flash("Sent receipt to printer / PDF");
  };

  // ---------- render ----------
  return (
    <div className="page">
      <Toast toast={toast} />

      <div className="page-head">
        <div>
          <div className="page-eyebrow">Finance · Fees register</div>
          <div className="page-title">Fees & <span className="amber">UPI</span></div>
          <div style={{ display: "flex", gap: 10, color: "var(--ink-3)", fontSize: 12, marginTop: 12, flexWrap: "wrap" }}>
            <span className="chip ok"><span className="dot" />{moneyK(totals.collected)} collected (live)</span>
            <span className="chip warn"><span className="dot" />{moneyK(totals.pending)} pending</span>
            <span className="chip bad"><span className="dot" />{moneyK(totals.overdue)} overdue</span>
          </div>
        </div>
        <div className="page-actions">
          {isParent ? (
            /* Parent view: one primary call-to-action when a pending fee exists */
            scopedPending.length > 0 && (
              <button className="btn accent" onClick={() => { setSelected(scopedPending[0]); setStage("pick"); flash("Let's pay this term's fee"); }}>
                <Icon name="fees" size={13} />Pay now · {moneyK(scopedPending[0].amount)}
              </button>
            )
          ) : (
            <>
              <button className="btn" onClick={importStructure}><Icon name="upload" size={13} />Import structure</button>
              <button className="btn" onClick={exportCsv}><Icon name="download" size={13} />Export CSV</button>
              <div style={{ position: "relative" }}>
                <button className="btn accent" onClick={headerCollect}>
                  <Icon name="plus" size={13} />Collect fee
                  {scopedPending.length > 0 && (
                    <span className="mono" style={{ marginLeft: 4, fontSize: 11, opacity: 0.85 }}>
                      · {scopedPending.length} pending
                    </span>
                  )}
                </button>

                    <button className="btn accent" onClick={proceed} style={{ justifyContent: "center", padding: "10px 12px" }}>
                      Proceed <Icon name="arrowRight" size={13} />

                <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 10 }}>
                  <div className="qrbox"><FakeQR size={156} /></div>

            </div>
          )}
        </div>
      </div>
    </div>
  );

// ---------- helper components ----------
function Toast({ toast }) {
  if (!toast) return null;
  const bg = toast.tone === "bad" ? "var(--bad)" : toast.tone === "warn" ? "var(--warn)" : "var(--ok)";
  return (
    <div
      style={{
        position: "fixed",
        top: 76,
        left: "50%",
        transform: "translateX(-50%)",
        zIndex: 300,
        background: bg,
        color: "#fff",
        padding: "10px 18px",
        borderRadius: 999,
        fontSize: 12.5,
        fontWeight: 500,
        boxShadow: "var(--shadow-lg)",
      }}
    >
      {toast.msg}
    </div>
  );
}

function CollectMenu({ items, onPick, onClose }) {
  useEffect(() => {
    const onDoc = (e) => {
      if (!e.target.closest(".collect-menu") && !e.target.closest(".btn")) onClose();
    };
    setTimeout(() => document.addEventListener("click", onDoc), 0);
    return () => document.removeEventListener("click", onDoc);
  }, [onClose]);

  return (
    <div
      className="collect-menu"
      style={{
        position: "absolute",
        top: "calc(100% + 6px)",
        right: 0,
        zIndex: 60,
        background: "var(--card)",
        border: "1px solid var(--rule)",
        borderRadius: 12,
        boxShadow: "var(--shadow-lg)",
        padding: 6,
        width: 320,
        maxHeight: 380,
        overflowY: "auto",
      }}
    >
      <div style={{ fontSize: 10.5, color: "var(--ink-3)", textTransform: "uppercase", letterSpacing: "0.08em", padding: "8px 10px 6px", display: "flex", alignItems: "center", gap: 8 }}>
        Pending fees · pick a student
        <span className="mono" style={{ marginLeft: "auto", color: "var(--ink-4)" }}>{items.length}</span>
      </div>
      {items.length === 0 && <div className="empty" style={{ padding: 16 }}>No pending fees.</div>}
      {items.map((f) => (
        <button
          key={f.id}
          onClick={() => onPick(f)}
          className="btn ghost"
          style={{
            width: "100%",
            justifyContent: "flex-start",
            height: "auto",
            padding: "10px 10px",
            gap: 10,
            display: "flex",
            alignItems: "center",
          }}
        >
          <span style={{
            width: 30, height: 30, borderRadius: "50%",
            background: "linear-gradient(135deg, var(--accent), var(--accent-2))",
            color: "#fff", display: "grid", placeItems: "center",
            fontWeight: 600, fontSize: 11.5, flexShrink: 0,
          }}>
            {f.name.split(" ").map((n) => n[0]).join("")}
          </span>
          <span style={{ flex: 1, minWidth: 0, textAlign: "left" }}>
            <span style={{ display: "block", fontSize: 13, fontWeight: 500, color: "var(--ink)" }}>{f.name}</span>
            <span style={{ display: "block", fontSize: 11, color: "var(--ink-3)" }}>{f.cls} · {f.id} · due {f.due}</span>
          </span>
          <span className="mono" style={{ fontSize: 12, fontWeight: 500, color: f.overdue ? "var(--bad)" : "var(--ink-2)" }}>
            ₹{f.amount.toLocaleString("en-IN")}
          </span>
        </button>
      ))}
    </div>
  );
}

function FilterMenu({ value, onPick, onClose }) {
  // close on outside click
  useEffect(() => {
    const onDoc = (e) => {
      if (!e.target.closest(".filter-menu") && !e.target.closest(".btn")) onClose();
    };
    setTimeout(() => document.addEventListener("click", onDoc), 0);
    return () => document.removeEventListener("click", onDoc);
  }, [onClose]);

  const opts = ["All", "Class 1", "Class 2", "Class 3", "Class 4", "Class 5", "Class 6", "Class 7", "Class 8"];
  return (
    <div
      className="filter-menu"
      style={{
        position: "absolute",
        top: "calc(100% + 6px)",
        right: 0,
        zIndex: 50,
        background: "var(--card)",
        border: "1px solid var(--rule)",
        borderRadius: 10,
        boxShadow: "var(--shadow-lg)",
        padding: 6,
        minWidth: 160,
      }}
    >
      <div style={{ fontSize: 10.5, color: "var(--ink-3)", textTransform: "uppercase", letterSpacing: "0.08em", padding: "6px 10px 4px" }}>
        Filter by class
      </div>
      {opts.map((o) => (
        <button
          key={o}
          onClick={() => onPick(o)}
          className="btn ghost"
          style={{
            width: "100%",
            justifyContent: "flex-start",
            height: 30,
            padding: "0 10px",
            fontSize: 12.5,
            background: value === o ? "var(--accent-soft)" : "transparent",
            color: value === o ? "var(--accent-2)" : "var(--ink)",
            fontWeight: value === o ? 500 : 400,
          }}
        >
          {o}
        </button>
      ))}
    </div>
  );
}
